<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hors ligne — Seba</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<meta name="robots" content="noindex">
<style>
/* Page servie par le service worker SANS réseau : autonome par construction —
   police système, zéro requête externe, styles tokenisés dans :root. */
:root{--em:#0D9488;--ink:#0a0a0c;--white:#FFFFFF;--t2:rgba(255,255,255,.5);--t3:rgba(255,255,255,.22);--bd:rgba(255,255,255,.1);--db-blue:#1D4ED8;--db-teal:#0D9488;--zinc-950:#09090B;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:var(--ink);color:var(--white);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;-webkit-font-smoothing:antialiased;}
:focus-visible{outline:2px solid var(--em);outline-offset:3px;}
.dot{width:10px;height:10px;border-radius:50%;background:var(--t3);margin-bottom:20px;position:relative;}
.dot::after{content:'';position:absolute;inset:-6px;border-radius:50%;border:1.5px solid var(--t3);opacity:.5;}
h1{font-size:clamp(1.3rem,4.5vw,1.7rem);font-weight:700;letter-spacing:-.02em;margin-bottom:10px;}
p{color:var(--t2);font-size:.95rem;max-width:420px;line-height:1.6;margin-bottom:28px;}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:13px 28px;border-radius:10px;font-size:.92rem;font-weight:700;border:none;cursor:pointer;background:var(--em);color:var(--ink);font-family:inherit;transition:opacity .15s;}
.btn:hover{opacity:.85;}
.hint{margin-top:22px;font-size:.8rem;color:var(--t3);}
/* Encre Vivante : respiration lente du point — la solitude, pas la panne. */
html.fx-on .dot{animation:fxDotBreathe 4s ease-in-out infinite;}
@keyframes fxDotBreathe{0%,100%{opacity:.5;transform:scale(1);}50%{opacity:1;transform:scale(1.25);}}
</style>
<style>
/* ── Harmonisation typographique Tactical Dark (spec fondateur) : Geist
   partout, letter-spacing compact et chirurgical. Bloc en fin de <head>
   pour gagner la cascade sur les styles de page. ── */
body,button,input,select,textarea{font-family:'Geist','Inter Display',Inter,sans-serif;}
h2,h3{letter-spacing:-0.04em;}
p{letter-spacing:-0.02em;}
</style>
</head>
<body>
<script>if(!navigator.webdriver&&!(window.matchMedia&&matchMedia('(prefers-reduced-motion: reduce)').matches))document.documentElement.classList.add('fx-on');</script>
<div class="dot" aria-hidden="true"></div>
<h1>Vous êtes hors ligne</h1>
<p>Impossible de joindre le réseau pour le moment. Les pages déjà visitées restent consultables ; celle-ci n'était pas encore dans le cache.</p>
<button class="btn" onclick="location.reload()">Réessayer</button>
<p class="hint">Vos données locales sont en sécurité sur cet appareil — rien n'est perdu.</p>
<script>
// Retour automatique dès que la connexion revient.
addEventListener('online', function () { location.reload(); });
</script>
</body>
</html>
