<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seba — L'écosystème des entreprises de terrain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="pro-global.css">
<style>
  :root {
    --ink: #14161A;
    --emerald: #00C896;
    --plum: #3D2645;
    --bg: #FAF9F7;
    --white: #FFFFFF;
    --text-2: #6B6A6F;
    --border: #E8E6E1;
    --r: 12px;
    --rs: 8px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;}
  a{color:inherit;text-decoration:none;}
  button,input,textarea,select{font-family:'Inter',sans-serif;}
  :focus-visible{outline:2px solid var(--emerald);outline-offset:3px;}

  .layout{display:grid;grid-template-columns:220px minmax(0,1fr);min-height:100vh;}
  .sidebar{background:var(--ink);color:var(--white);padding:24px 0;display:flex;flex-direction:column;}
  .logo{font-weight:700;font-size:1.2rem;padding:0 24px 28px;display:flex;align-items:center;}
  .logo-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--emerald);margin-right:8px;flex-shrink:0;}
  .nav-section{padding:0 14px;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:var(--rs);font-size:0.9rem;color:rgba(255,255,255,.55);cursor:pointer;margin-bottom:2px;transition:background .15s,color .15s;}
  .nav-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.9);}
  .nav-item.active{background:rgba(0,200,150,.12);color:var(--emerald);}
  .nav-item .dot{width:6px;height:6px;border-radius:50%;background:var(--emerald);opacity:0;}
  .nav-item.active .dot{opacity:1;}
  .sidebar-footer{margin-top:auto;padding:14px 24px;border-top:1px solid rgba(255,255,255,.08);font-size:0.78rem;color:rgba(255,255,255,.35);}

  .main{padding:32px 40px;}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:14px;}
  .topbar h1{font-size:1.5rem;}
  .btn-em{background:var(--emerald);color:var(--ink);border:none;padding:10px 18px;border-radius:var(--rs);font-weight:600;font-size:0.86rem;cursor:pointer;transition:opacity .15s,transform .15s;display:inline-flex;align-items:center;gap:6px;}
  .btn-em:hover{opacity:.88;transform:translateY(-1px);}

  .team-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
  .member-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--r);padding:20px;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.05);transition:border-color .15s;}
  .member-card:hover{border-color:var(--emerald);}
  .member-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
  .member-avatar{width:44px;height:44px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-weight:600;color:var(--ink);flex-shrink:0;font-size:0.85rem;border:1px solid var(--border);}
  .member-name{font-weight:600;font-size:0.95rem;}
  .member-role{font-size:0.78rem;color:var(--text-2);margin-top:2px;}
  .member-stats{display:flex;justify-content:space-between;border-top:1px solid var(--border);padding-top:12px;font-size:0.8rem;color:var(--text-2);}
  .member-stats b{color:var(--ink);font-weight:600;}
  .status-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;vertical-align:middle;}
  .status-dot.on{background:var(--emerald);}
  .status-dot.off{background:var(--border);}
  .access-badge{font-size:0.7rem;padding:2px 8px;border-radius:10px;background:var(--bg);color:var(--text-2);margin-top:10px;display:inline-block;border:1px solid var(--border);}

  .add-card{border:1.5px dashed var(--border);border-radius:var(--r);display:flex;align-items:center;justify-content:center;flex-direction:column;color:var(--text-2);font-size:0.88rem;cursor:pointer;min-height:150px;transition:border-color .15s,color .15s;}
  .add-card:hover{border-color:var(--emerald);color:var(--ink);}
  .add-card .plus{font-size:1.8rem;margin-bottom:6px;line-height:1;}

  .topbar-right{display:flex;align-items:center;gap:14px;}
  .avatar{width:38px;height:38px;border-radius:50%;background:var(--emerald);color:var(--ink);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:0.85rem;cursor:pointer;user-select:none;}
  .avatar-wrap{position:relative;}
  .user-menu{position:absolute;right:0;top:calc(100% + 8px);background:#fff;border:1px solid var(--border);border-radius:var(--rs);padding:6px;min-width:168px;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,0.08);display:none;}
  .user-menu.open{display:block;}
  .user-menu a{display:block;padding:9px 12px;border-radius:6px;font-size:0.88rem;color:var(--ink);}
  .user-menu a:hover{background:var(--bg);}
  .user-menu .menu-sep{height:1px;background:var(--border);margin:4px 0;}
  .user-menu .menu-deconnect{color:var(--text-2);}

  /* ── Side sheet ── */
  .ss-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.35);backdrop-filter:blur(4px);z-index:499;opacity:0;pointer-events:none;transition:opacity .25s;}
  .ss-backdrop.open{opacity:1;pointer-events:all;}
  .ss-panel{position:fixed;right:0;top:0;bottom:0;width:420px;max-width:100vw;background:#fff;z-index:500;display:flex;flex-direction:column;box-shadow:-4px 0 32px rgba(0,0,0,.12);transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);}
  .ss-panel.open{transform:translateX(0);}
  .ss-hdr{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border);}
  .ss-hdr h2{font-size:1.05rem;font-weight:600;}
  .ss-close{background:none;border:none;cursor:pointer;color:var(--text-2);font-size:1.3rem;line-height:1;padding:4px;}
  .ss-close:hover{color:var(--ink);}
  .ss-body{flex:1;overflow-y:auto;padding:24px;}
  .ss-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;}
  .ss-field{margin-bottom:16px;}
  .ss-field label{display:block;font-size:0.78rem;font-weight:500;color:var(--text-2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.02em;}
  .ss-field input,.ss-field select,.ss-field textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--rs);font-size:0.9rem;background:#fff;color:var(--ink);transition:border-color .15s;}
  .ss-field input:focus,.ss-field select:focus,.ss-field textarea:focus{border-color:var(--emerald);outline:none;}
  .ss-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .btn-ss-ghost{background:none;border:1px solid var(--border);color:var(--ink);padding:10px 18px;border-radius:var(--rs);font-size:0.86rem;font-weight:500;cursor:pointer;transition:background .15s;}
  .btn-ss-ghost:hover{background:var(--bg);}
  .btn-ss-em{background:var(--emerald);color:var(--ink);border:none;padding:10px 18px;border-radius:var(--rs);font-size:0.86rem;font-weight:600;cursor:pointer;transition:opacity .15s;}
  .btn-ss-em:hover{opacity:.88;}

  /* Toast */
  .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:var(--r);font-size:0.86rem;font-weight:500;z-index:600;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @media (max-width:980px){
    .layout{grid-template-columns:1fr;}
    .team-grid{grid-template-columns:repeat(2,1fr);}
    .main{padding:24px 20px;}
    .ss-panel{width:100vw;}
  }
  @media (max-width:620px){
    .team-grid{grid-template-columns:1fr;}
  }
</style>
  <link rel="icon" type="image/jpeg" href="favicon.jpg">
</head>
<body>
<div class="layout">
  <div class="mobile-header">
    <div class="mobile-logo"><div class="mobile-logo-dot"></div>Seba</div>
    <button class="hamburger" id="hamburger" aria-label="Ouvrir le menu" onclick="toggleSidebar()">
      <span></span><span></span><span></span>
    </button>
  </div>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
  <aside class="sidebar">
    <div class="logo"><span class="logo-dot"></span>Seba</div>
    <nav class="nav-section">
      <a href="dashboard.html"><div class="nav-item"><span class="dot"></span>Vue d'ensemble</div></a>
      <a href="clients.html"><div class="nav-item"><span class="dot"></span>Clients</div></a>
      <a href="planning.html"><div class="nav-item"><span class="dot"></span>Planning</div></a>
      <a href="devis.html"><div class="nav-item"><span class="dot"></span>Devis</div></a>
      <a href="factures.html"><div class="nav-item"><span class="dot"></span>Factures</div></a>
      <div class="nav-item active"><span class="dot"></span>Équipe</div>
      <a href="reglages.html"><div class="nav-item"><span class="dot"></span>Réglages</div></a>
    </nav>
    <div class="sidebar-footer" id="sidebar-footer">Ménage Express Lyon<br>Compte de démonstration</div>
  </aside>

  <main class="main">
    <div class="topbar">
      <h1>Équipe</h1>
      <div class="topbar-right">
        <button class="btn-em" onclick="openSheet()">+ Ajouter un employé</button>
        <div class="avatar-wrap">
          <div class="avatar" id="avatar-btn">ML</div>
          <div class="user-menu" id="user-menu">
            <a href="reglages.html">Mon compte</a>
            <div class="menu-sep"></div>
            <a href="connexion.html" class="menu-deconnect">Se déconnecter</a>
          </div>
        </div>
      </div>
    </div>

    <div class="team-grid" id="team-grid"></div>
  </main>
</div>

<!-- Side sheet : ajouter un employé -->
<div class="ss-backdrop" id="ss-backdrop" onclick="closeSheet()"></div>
<div class="ss-panel" id="ss-panel" role="dialog" aria-modal="true" aria-label="Ajouter un employé">
  <div class="ss-hdr">
    <h2>Nouvel employé</h2>
    <button class="ss-close" onclick="closeSheet()" aria-label="Fermer">&times;</button>
  </div>
  <div class="ss-body">
    <div class="ss-2col">
      <div class="ss-field">
        <label for="ss-prenom">Prénom</label>
        <input type="text" id="ss-prenom" placeholder="Julie">
      </div>
      <div class="ss-field">
        <label for="ss-nom">Nom</label>
        <input type="text" id="ss-nom" placeholder="Bernard">
      </div>
    </div>
    <div class="ss-field">
      <label for="ss-role">Rôle / Poste</label>
      <input type="text" id="ss-role" placeholder="Agent de ménage, Concierge...">
    </div>
    <div class="ss-field">
      <label for="ss-email">Email</label>
      <input type="email" id="ss-email" placeholder="julie.bernard@email.fr">
    </div>
    <div class="ss-field">
      <label for="ss-tel">Téléphone</label>
      <input type="tel" id="ss-tel" placeholder="06 12 34 56 78">
    </div>
    <div class="ss-field">
      <label for="ss-acces">Niveau d'accès</label>
      <select id="ss-acces">
        <option value="planning + clients">Planning + clients</option>
        <option value="planning seulement">Planning seulement</option>
        <option value="accès complet">Accès complet</option>
      </select>
    </div>
  </div>
  <div class="ss-footer">
    <button class="btn-ss-ghost" onclick="closeSheet()">Annuler</button>
    <button class="btn-ss-em" onclick="submitEmploye()">Ajouter l'employé</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── Données équipe ──
  const EMPLOYES = [
    { prenom:'Léa',   nom:'Martin',  role:'Agent de ménage', missions:5, actif:true,  acces:'planning + clients' },
    { prenom:'Karim', nom:'Benali',  role:'Agent polyvalent', missions:4, actif:true,  acces:'planning + clients' },
    { prenom:'Nora',  nom:'Rahmani', role:'Agente de ménage', missions:3, actif:false, acces:'planning seulement' },
  ];

  function initials(e) {
    return (e.prenom[0] + e.nom[0]).toUpperCase();
  }

  function render() {
    const grid = document.getElementById('team-grid');
    grid.innerHTML = '';
    EMPLOYES.forEach(e => {
      const slug = encodeURIComponent(e.prenom + ' ' + e.nom);
      const card = document.createElement('div');
      card.className = 'member-card';
      card.onclick = () => location.href = 'employe-fiche.html?nom=' + slug;
      card.innerHTML =
        '<div class="member-top">' +
          '<div class="member-avatar">' + initials(e) + '</div>' +
          '<div>' +
            '<div class="member-name">' + e.prenom + ' ' + e.nom + '</div>' +
            '<div class="member-role"><span class="status-dot ' + (e.actif ? 'on' : 'off') + '"></span>' + (e.actif ? 'En mission' : 'Repos aujourd\'hui') + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="member-stats"><span>Missions cette semaine</span><b>' + e.missions + '</b></div>' +
        '<span class="access-badge">Accès : ' + e.acces + '</span>';
      grid.appendChild(card);
    });

    // Carte "+" toujours en dernier
    const addCard = document.createElement('div');
    addCard.className = 'add-card';
    addCard.onclick = openSheet;
    addCard.innerHTML = '<span class="plus">+</span>Ajouter un employé';
    grid.appendChild(addCard);
  }

  // ── Side sheet ──
  function openSheet() {
    document.getElementById('ss-backdrop').classList.add('open');
    document.getElementById('ss-panel').classList.add('open');
    document.body.style.overflow = 'hidden';
    setTimeout(() => document.getElementById('ss-prenom').focus(), 120);
  }

  function closeSheet() {
    document.getElementById('ss-backdrop').classList.remove('open');
    document.getElementById('ss-panel').classList.remove('open');
    document.body.style.overflow = '';
  }

  function submitEmploye() {
    const prenom = document.getElementById('ss-prenom').value.trim();
    const nom    = document.getElementById('ss-nom').value.trim();
    const role   = document.getElementById('ss-role').value.trim() || 'Employé';
    const acces  = document.getElementById('ss-acces').value;

    if (!prenom || !nom) {
      document.getElementById('ss-prenom').focus();
      return;
    }

    EMPLOYES.push({ prenom, nom, role, missions: 0, actif: false, acces });
    render();
    closeSheet();
    ['ss-prenom','ss-nom','ss-role','ss-email','ss-tel'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('ss-acces').selectedIndex = 0;
    showToast(prenom + ' ' + nom + ' ajouté(e) à l\'équipe');
  }

  // ── Toast ──
  let _toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => t.classList.remove('show'), 3200);
  }

  // ── Escape ──
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeSheet();
  });

  // ── Avatar menu ──
  const avatarBtn = document.getElementById('avatar-btn');
  const userMenu  = document.getElementById('user-menu');
  avatarBtn.addEventListener('click', e => {
    e.stopPropagation();
    userMenu.classList.toggle('open');
  });
  document.addEventListener('click', () => userMenu.classList.remove('open'));

  // ── Sidebar mobile ──
  function toggleSidebar() {
    const isOpen = document.querySelector('.sidebar').classList.toggle('open');
    document.getElementById('sidebar-overlay').classList.toggle('open');
    document.body.style.overflow = isOpen ? 'hidden' : '';
  }
  function closeSidebar() {
    document.querySelector('.sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  // ── Init ──
  try {
    const biz = JSON.parse(localStorage.getItem('sebaEntreprise') || '{}');
    if (biz.nom) document.getElementById('sidebar-footer').innerHTML = biz.nom + '<br>Compte de démonstration';
  } catch(e) {}

  render();
</script>
</body>
</html>
