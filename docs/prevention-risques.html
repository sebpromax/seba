<!DOCTYPE html>
<html lang="fr" class="h-full bg-slate-900">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seba — L'écosystème des entreprises de terrain</title>
<link rel="stylesheet" href="styles/main.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
:root{--font-sans:'Plus Jakarta Sans',sans-serif;--font-mono:'JetBrains Mono',monospace;}
body{font-family:var(--font-sans);}
.font-mono{font-family:var(--font-mono)!important;}
.text-2xs{font-size:.65rem;line-height:1rem;}
.text-3xs{font-size:.55rem;line-height:.85rem;}
.risk-badge-1{background:rgba(34,197,94,.1);color:#22c55e;border-color:rgba(34,197,94,.3);}
.risk-badge-2{background:rgba(234,179,8,.1);color:#eab308;border-color:rgba(234,179,8,.3);}
.risk-badge-3{background:rgba(249,115,22,.1);color:#f97316;border-color:rgba(249,115,22,.3);}
.risk-badge-4{background:rgba(239,68,68,.1);color:#ef4444;border-color:rgba(239,68,68,.3);}
</style>
  <link rel="icon" type="image/jpeg" href="favicon.jpg">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0a0c">
  <link rel="apple-touch-icon" href="icon-192.png">
  <script>if("serviceWorker" in navigator){addEventListener("load",function(){navigator.serviceWorker.register("sw.js").catch(function(){})})}</script>
</head>
<body class="h-full text-slate-100 antialiased">

<header class="bg-slate-950 border-b border-slate-800 sticky top-0 z-40 px-6 py-4 flex items-center justify-between">
  <div class="flex items-center space-x-4">
    <a href="core-ux.html" class="text-xl font-bold tracking-tighter text-white font-mono">seba<span class="text-emerald-500">.</span></a>
    <div class="h-4 w-px bg-slate-800"></div>
    <span class="text-2xs font-bold text-slate-400 uppercase tracking-widest font-mono">LOT 4.2 // PPSPS · ANALYSE RISQUES</span>
  </div>
  <div class="flex items-center space-x-3">
    <a href="trava-dechets.html" class="text-2xs font-bold bg-slate-800 border border-slate-700 text-slate-300 px-3 py-1.5 rounded hover:text-white transition-colors">← 4.1</a>
    <a href="rh-compagnonnage.html" class="text-2xs font-bold bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 px-3 py-1.5 rounded hover:bg-emerald-500/20 transition-colors">4.3 →</a>
  </div>
</header>

<main class="max-w-6xl mx-auto p-6 space-y-6">

  <!-- PPSPS -->
  <div class="bg-slate-950 border border-slate-800 rounded-xl p-6">
    <div class="flex items-center justify-between mb-4">
      <div>
        <h2 class="text-sm font-bold uppercase tracking-wider text-white font-mono">PPSPS — Plan de Prévention</h2>
        <p class="text-xs text-slate-500 mt-1">Plan Particulier de Sécurité et de Protection de la Santé (Art. R4532-68 du Code du travail)</p>
      </div>
      <button onclick="addPPSPS()" class="text-sm font-bold bg-amber-500/10 border border-amber-500/30 text-amber-400 px-4 py-2 rounded-lg hover:bg-amber-500/20 transition-colors">+ Nouveau PPSPS</button>
    </div>

    <div id="ppsps-form" class="hidden bg-slate-900 border border-amber-500/20 rounded-xl p-5 mb-4 space-y-3">
      <div class="grid grid-cols-2 gap-3">
        <input type="text" id="pp-chantier" placeholder="Chantier / Opération" class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2.5 text-sm text-slate-200 outline-none focus:border-amber-500">
        <input type="text" id="pp-maitre" placeholder="Maître d'ouvrage" class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2.5 text-sm text-slate-200 outline-none focus:border-amber-500">
      </div>
      <div class="grid grid-cols-3 gap-3">
        <input type="date" id="pp-debut" class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2.5 text-sm text-slate-200 outline-none focus:border-amber-500">
        <input type="date" id="pp-fin" class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2.5 text-sm text-slate-200 outline-none focus:border-amber-500">
        <input type="number" id="pp-travailleurs" placeholder="Nb travailleurs" min="1" class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2.5 text-sm text-slate-200 outline-none focus:border-amber-500 font-mono">
      </div>
      <div class="flex gap-2">
        <button onclick="savePPSPS()" class="bg-amber-500 hover:bg-amber-400 text-slate-900 font-bold text-sm px-5 py-2 rounded-lg">Créer PPSPS</button>
        <button onclick="document.getElementById('ppsps-form').classList.add('hidden')" class="bg-slate-800 text-slate-400 text-sm px-4 py-2 rounded-lg">Annuler</button>
      </div>
    </div>

    <div id="ppsps-list" class="space-y-3"></div>
  </div>

  <!-- Analyse des Risques -->
  <div class="bg-slate-950 border border-slate-800 rounded-xl p-6">
    <div class="flex items-center justify-between mb-4">
      <h3 class="text-sm font-bold uppercase tracking-wider text-white font-mono">Analyse des Risques — Grille INRS</h3>
      <button onclick="addRisk()" class="text-sm font-bold bg-rose-500/10 border border-rose-500/30 text-rose-400 px-4 py-2 rounded-lg hover:bg-rose-500/20 transition-colors">+ Risque</button>
    </div>
    <div class="grid grid-cols-4 gap-2 mb-4 text-center text-3xs font-mono text-slate-600">
      <span></span><span>G=1 Faible</span><span>G=2 Moyen</span><span>G=3 Grave</span>
    </div>
    <div id="risks-list" class="space-y-2"></div>
    <div id="risk-add-form" class="hidden mt-3 grid grid-cols-2 md:grid-cols-4 gap-3 p-4 bg-slate-900 border border-rose-500/20 rounded-xl">
      <input type="text" id="risk-desc" placeholder="Description du risque" class="col-span-2 bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm text-slate-200 outline-none focus:border-rose-500">
      <select id="risk-freq" class="bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm text-slate-200 outline-none" style="background:#1e293b;">
        <option value="1">F=1 Rare</option><option value="2">F=2 Possible</option><option value="3">F=3 Fréquent</option>
      </select>
      <select id="risk-grav" class="bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm text-slate-200 outline-none" style="background:#1e293b;">
        <option value="1">G=1 Faible</option><option value="2">G=2 Moyen</option><option value="3">G=3 Grave</option>
      </select>
      <input type="text" id="risk-mesure" placeholder="Mesure de prévention" class="col-span-3 bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm text-slate-200 outline-none focus:border-rose-500">
      <button onclick="saveRisk()" class="bg-rose-500 hover:bg-rose-400 text-white font-bold text-sm rounded">+</button>
    </div>
  </div>

  <!-- Attestations -->
  <div class="bg-slate-950 border border-slate-800 rounded-xl p-6">
    <h3 class="text-sm font-bold uppercase tracking-wider text-white mb-4 font-mono">Attestations & Documents de Sécurité</h3>
    <div id="attestations-list" class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4"></div>
    <button onclick="addAttestation()" class="text-2xs font-bold bg-slate-800 border border-slate-700 text-slate-300 px-3 py-1.5 rounded hover:text-white transition-colors">+ Ajouter attestation</button>
  </div>

</main>

<script>
const SebaStorage={write:(k,v)=>{try{localStorage.setItem('seba_'+k,JSON.stringify(v));}catch(e){}},read:(k)=>{try{const d=localStorage.getItem('seba_'+k);return d?JSON.parse(d):null;}catch(e){return null;}}};
let ppspsItems=SebaStorage.read('ppsps_items')||[];
let risks=SebaStorage.read('risk_items')||[];
let attestations=SebaStorage.read('attestations')||[
  {id:'a1',nom:'SIRET',expiry:'—',statut:'valide'},
  {id:'a2',nom:'Assurance RC Pro',expiry:'31/12/2026',statut:'valide'},
  {id:'a3',nom:'URSSAF — Attestation de vigilance',expiry:'30/09/2026',statut:'valide'},
  {id:'a4',nom:'Formation SST',expiry:'15/03/2027',statut:'valide'},
];

function addPPSPS(){document.getElementById('ppsps-form').classList.remove('hidden');document.getElementById('pp-debut').value=new Date().toISOString().slice(0,10);}

function savePPSPS(){
  const chantier=document.getElementById('pp-chantier').value.trim();
  if(!chantier)return;
  const num='PPSPS-'+new Date().getFullYear()+'-'+String(ppspsItems.length+1).padStart(3,'0');
  ppspsItems.push({id:'pp_'+Date.now(),num,chantier,maitre:document.getElementById('pp-maitre').value,debut:document.getElementById('pp-debut').value,fin:document.getElementById('pp-fin').value,travailleurs:document.getElementById('pp-travailleurs').value||1,statut:'actif'});
  SebaStorage.write('ppsps_items',ppspsItems);
  document.getElementById('ppsps-form').classList.add('hidden');renderPPSPS();
}

function renderPPSPS(){
  document.getElementById('ppsps-list').innerHTML=ppspsItems.length===0
    ?'<div class="text-xs text-slate-600 font-mono text-center py-4">Aucun PPSPS</div>'
    :ppspsItems.map(p=>`
    <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 flex items-center justify-between">
      <div>
        <div class="flex items-center gap-2"><span class="text-2xs font-bold text-amber-400 font-mono">${p.num}</span></div>
        <div class="text-sm font-bold text-slate-200 mt-1">${p.chantier}</div>
        <div class="text-3xs text-slate-500 font-mono">${p.debut||'—'} → ${p.fin||'—'} · ${p.travailleurs} travailleur(s)</div>
      </div>
      <div class="flex gap-2">
        <button onclick="exportPPSPS('${p.id}')" class="text-2xs font-bold bg-amber-500/10 text-amber-400 px-3 py-1.5 rounded font-mono hover:bg-amber-500/20">↓ PDF</button>
      </div>
    </div>`).join('');
}

function exportPPSPS(id){
  const p=ppspsItems.find(x=>x.id===id);if(!p)return;
  const biz=JSON.parse(localStorage.getItem('sebaEntreprise')||'{}');
  const txt=`PLAN PARTICULIER DE SÉCURITÉ ET DE PROTECTION DE LA SANTÉ\n${p.num}\n\nEntreprise : ${biz.nomEntreprise||'Mon Entreprise'}\nChantier : ${p.chantier}\nMaître d'ouvrage : ${p.maitre||'—'}\nPériode : ${p.debut} au ${p.fin}\nNombre de travailleurs : ${p.travailleurs}\n\n[Contenu PPSPS selon R4532-68 à générer]\n`;
  const blob=new Blob([txt],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=p.num+'.txt';a.click();
}

function addRisk(){document.getElementById('risk-add-form').classList.remove('hidden');}

function saveRisk(){
  const desc=document.getElementById('risk-desc').value.trim();if(!desc)return;
  const freq=parseInt(document.getElementById('risk-freq').value);
  const grav=parseInt(document.getElementById('risk-grav').value);
  risks.push({id:'r_'+Date.now(),desc,freq,grav,score:freq*grav,mesure:document.getElementById('risk-mesure').value.trim()});
  SebaStorage.write('risk_items',risks);
  ['risk-desc','risk-mesure'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('risk-add-form').classList.add('hidden');renderRisks();
}

function renderRisks(){
  document.getElementById('risks-list').innerHTML=risks.length===0
    ?'<div class="text-xs text-slate-600 font-mono text-center py-4">Aucun risque identifié</div>'
    :risks.map(r=>{
      const lvl=r.score<=2?1:r.score<=4?2:r.score<=6?3:4;
      const badge=['','risk-badge-1','risk-badge-2','risk-badge-3','risk-badge-4'][lvl];
      const label=['','Acceptable','Modéré','Important','Critique'][lvl];
      return`<div class="flex items-start justify-between bg-slate-900 border border-slate-800 rounded-lg px-4 py-3">
        <div class="flex-1">
          <div class="text-xs font-bold text-slate-200">${r.desc}</div>
          ${r.mesure?`<div class="text-3xs text-slate-500 mt-1">→ ${r.mesure}</div>`:''}
        </div>
        <div class="flex items-center gap-2 ml-4">
          <span class="text-3xs font-mono text-slate-500">F${r.freq}×G${r.grav}</span>
          <span class="text-2xs font-bold px-2 py-0.5 rounded border font-mono ${badge}">${label} (${r.score})</span>
        </div>
      </div>`;}).join('');
}

function addAttestation(){
  const nom=prompt('Nom de l\'attestation :');if(!nom)return;
  const expiry=prompt('Date d\'expiration (jj/mm/aaaa) :','—')||'—';
  attestations.push({id:'a_'+Date.now(),nom,expiry,statut:'valide'});
  SebaStorage.write('attestations',attestations);renderAttestations();
}

function toggleAttestation(id){
  const a=attestations.find(x=>x.id===id);if(a)a.statut=a.statut==='valide'?'expiré':'valide';
  SebaStorage.write('attestations',attestations);renderAttestations();
}

function renderAttestations(){
  document.getElementById('attestations-list').innerHTML=attestations.map(a=>`
    <div class="bg-slate-900 border ${a.statut==='valide'?'border-emerald-500/20':'border-rose-500/20'} rounded-xl p-4">
      <div class="flex items-start justify-between mb-2">
        <div class="text-xs font-bold text-slate-200">${a.nom}</div>
        <span class="text-3xs font-bold font-mono ${a.statut==='valide'?'text-emerald-400':'text-rose-400'}">${a.statut.toUpperCase()}</span>
      </div>
      <div class="text-3xs text-slate-500 font-mono">Expire : ${a.expiry}</div>
      <button onclick="toggleAttestation('${a.id}')" class="mt-2 text-3xs font-bold text-slate-600 hover:text-slate-400 transition-colors">${a.statut==='valide'?'Marquer expiré':'Renouveler'}</button>
    </div>`).join('');
}

renderPPSPS();renderRisks();renderAttestations();
</script>
</body>
</html>
