<!DOCTYPE html>
<html lang="fr" class="h-full bg-slate-900">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seba — L'écosystème des entreprises de terrain</title>
<link rel="stylesheet" href="styles/main.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
:root{--font-sans:'Plus Jakarta Sans',sans-serif;--font-mono:'JetBrains Mono',monospace;}
body{font-family:var(--font-sans);}
.font-mono{font-family:var(--font-mono)!important;}
.text-2xs{font-size:.65rem;line-height:1rem;}
.text-3xs{font-size:.55rem;line-height:.85rem;}
input[type=range]{accent-color:#10b981;}
</style>
  <link rel="icon" type="image/jpeg" href="favicon.jpg">
</head>
<body class="h-full text-slate-100 antialiased">

<header class="bg-slate-950 border-b border-slate-800 sticky top-0 z-40 px-6 py-4 flex items-center justify-between">
  <div class="flex items-center space-x-4">
    <a href="core-ux.html" class="text-xl font-bold tracking-tighter text-white font-mono">seba<span class="text-emerald-500">.</span></a>
    <div class="h-4 w-px bg-slate-800"></div>
    <span class="text-2xs font-bold text-slate-400 uppercase tracking-widest font-mono">LOT 1.3 // BFR PRÉDICTIF</span>
  </div>
  <div class="flex items-center space-x-3">
    <a href="registre-charges.html" class="text-2xs font-bold bg-slate-800 border border-slate-700 text-slate-300 px-3 py-1.5 rounded hover:text-white transition-colors">← 1.2</a>
    <a href="compta-expert.html" class="text-2xs font-bold bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 px-3 py-1.5 rounded hover:bg-emerald-500/20 transition-colors">1.4 →</a>
  </div>
</header>

<main class="max-w-6xl mx-auto p-6 space-y-6">

  <!-- Formule BFR -->
  <div class="bg-slate-950 border border-slate-800 rounded-xl p-6">
    <div class="flex items-center justify-between mb-6">
      <h2 class="text-sm font-bold uppercase tracking-wider text-white font-mono">Calcul du Besoin en Fonds de Roulement</h2>
      <span class="text-3xs font-bold text-slate-500 font-mono bg-slate-900 border border-slate-700 px-3 py-1.5 rounded">BFR = Stocks + Créances clients − Dettes fournisseurs</span>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
      <!-- Stocks -->
      <div class="space-y-3">
        <label class="text-2xs font-bold text-amber-400 uppercase tracking-wider font-mono flex items-center gap-2">
          <span class="h-2 w-2 rounded-full bg-amber-400"></span> Stocks & Fournitures
        </label>
        <div class="space-y-2">
          <div class="flex gap-2">
            <input type="text" placeholder="Libellé (ex. Produits ménagers)" id="stock-lbl" class="flex-1 bg-slate-900 border border-slate-700 rounded px-2 py-2 text-xs text-slate-200 outline-none focus:border-amber-500">
            <input type="number" placeholder="Valeur €" id="stock-val" min="0" class="w-24 bg-slate-900 border border-slate-700 rounded px-2 py-2 text-xs text-right text-amber-400 outline-none focus:border-amber-500 font-mono">
            <button onclick="addBFRLine('stocks')" class="bg-amber-500/20 hover:bg-amber-500/30 text-amber-400 text-xs px-2 rounded transition-colors">+</button>
          </div>
          <div id="stocks-list" class="space-y-1"></div>
          <div class="pt-2 border-t border-slate-800 flex justify-between text-2xs font-mono">
            <span class="text-slate-500">Sous-total stocks</span>
            <span id="total-stocks" class="text-amber-400 font-bold">0 €</span>
          </div>
        </div>
      </div>

      <!-- Créances clients -->
      <div class="space-y-3">
        <label class="text-2xs font-bold text-blue-400 uppercase tracking-wider font-mono flex items-center gap-2">
          <span class="h-2 w-2 rounded-full bg-blue-400"></span> Créances Clients
        </label>
        <div class="space-y-2">
          <div class="flex gap-2">
            <input type="text" placeholder="Client en attente de paiement" id="crean-lbl" class="flex-1 bg-slate-900 border border-slate-700 rounded px-2 py-2 text-xs text-slate-200 outline-none focus:border-blue-500">
            <input type="number" placeholder="Montant €" id="crean-val" min="0" class="w-24 bg-slate-900 border border-slate-700 rounded px-2 py-2 text-xs text-right text-blue-400 outline-none focus:border-blue-500 font-mono">
            <button onclick="addBFRLine('creances')" class="bg-blue-500/20 hover:bg-blue-500/30 text-blue-400 text-xs px-2 rounded transition-colors">+</button>
          </div>
          <div id="creances-list" class="space-y-1"></div>
          <div class="pt-2 border-t border-slate-800 flex justify-between text-2xs font-mono">
            <span class="text-slate-500">Sous-total créances</span>
            <span id="total-creances" class="text-blue-400 font-bold">0 €</span>
          </div>
        </div>
      </div>

      <!-- Dettes fournisseurs -->
      <div class="space-y-3">
        <label class="text-2xs font-bold text-rose-400 uppercase tracking-wider font-mono flex items-center gap-2">
          <span class="h-2 w-2 rounded-full bg-rose-400"></span> Dettes Fournisseurs
        </label>
        <div class="space-y-2">
          <div class="flex gap-2">
            <input type="text" placeholder="Fournisseur à régler" id="dette-lbl" class="flex-1 bg-slate-900 border border-slate-700 rounded px-2 py-2 text-xs text-slate-200 outline-none focus:border-rose-500">
            <input type="number" placeholder="Montant €" id="dette-val" min="0" class="w-24 bg-slate-900 border border-slate-700 rounded px-2 py-2 text-xs text-right text-rose-400 outline-none focus:border-rose-500 font-mono">
            <button onclick="addBFRLine('dettes')" class="bg-rose-500/20 hover:bg-rose-500/30 text-rose-400 text-xs px-2 rounded transition-colors">+</button>
          </div>
          <div id="dettes-list" class="space-y-1"></div>
          <div class="pt-2 border-t border-slate-800 flex justify-between text-2xs font-mono">
            <span class="text-slate-500">Sous-total dettes</span>
            <span id="total-dettes" class="text-rose-400 font-bold">0 €</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Résultat BFR -->
    <div class="bg-slate-900 border border-slate-700 rounded-xl p-5 flex items-center justify-between">
      <div>
        <div class="text-2xs text-slate-400 font-mono uppercase tracking-wider mb-1">Besoin en Fonds de Roulement</div>
        <div id="bfr-result" class="text-4xl font-bold font-mono text-white">0 €</div>
        <div id="bfr-interpretation" class="text-xs text-slate-500 mt-1"></div>
      </div>
      <div id="bfr-icon" class="text-4xl">📊</div>
    </div>
  </div>

  <!-- Acomptes & Situations de travaux -->
  <div class="bg-slate-950 border border-slate-800 rounded-xl p-6">
    <h3 class="text-sm font-bold uppercase tracking-wider text-white mb-4 font-mono">Acomptes & Situations de Travaux</h3>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
      <input type="text" id="ac-client" placeholder="Client / Chantier" class="bg-slate-900 border border-slate-700 rounded-lg px-3 py-2.5 text-sm text-slate-200 outline-none focus:border-emerald-500">
      <input type="number" id="ac-total" placeholder="Montant total HT €" class="bg-slate-900 border border-slate-700 rounded-lg px-3 py-2.5 text-sm text-slate-200 outline-none focus:border-emerald-500 font-mono" oninput="calcAcompte()">
      <div class="flex items-center gap-2">
        <input type="range" id="ac-pct" min="10" max="50" step="5" value="30" class="flex-1" oninput="calcAcompte();document.getElementById('ac-pct-lbl').textContent=this.value+'%'">
        <span id="ac-pct-lbl" class="text-xs font-bold text-emerald-400 font-mono w-10">30%</span>
      </div>
      <button onclick="addAcompte()" class="bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-bold text-sm rounded-lg transition-colors">Enregistrer</button>
    </div>
    <div id="ac-preview" class="text-2xs text-slate-500 font-mono mb-4"></div>
    <div id="acomptes-list" class="space-y-2"></div>
  </div>

</main>

<script>
const SebaStorage={write:(k,v)=>{try{localStorage.setItem('seba_'+k,JSON.stringify(v));}catch(e){}},read:(k)=>{try{const d=localStorage.getItem('seba_'+k);return d?JSON.parse(d):null;}catch(e){return null;}}};
let bfrData=SebaStorage.read('bfr_data')||{stocks:[],creances:[],dettes:[]};
let acomptes=SebaStorage.read('acomptes')||[];

function fmt(n){return new Intl.NumberFormat('fr-FR',{maximumFractionDigits:2}).format(n)+' €';}

function addBFRLine(type){
  const lblId={'stocks':'stock-lbl','creances':'crean-lbl','dettes':'dette-lbl'}[type];
  const valId={'stocks':'stock-val','creances':'crean-val','dettes':'dette-val'}[type];
  const lbl=document.getElementById(lblId).value.trim();
  const val=parseFloat(document.getElementById(valId).value)||0;
  if(!lbl||!val)return;
  bfrData[type].push({id:Date.now(),lbl,val});
  document.getElementById(lblId).value='';
  document.getElementById(valId).value='';
  SebaStorage.write('bfr_data',bfrData);
  renderBFR();
}

function removeBFRLine(type,id){bfrData[type]=bfrData[type].filter(x=>x.id!==id);SebaStorage.write('bfr_data',bfrData);renderBFR();}

function renderBFR(){
  ['stocks','creances','dettes'].forEach(type=>{
    const color={'stocks':'text-amber-400','creances':'text-blue-400','dettes':'text-rose-400'}[type];
    document.getElementById(type+'-list').innerHTML=bfrData[type].map(x=>`
      <div class="flex justify-between items-center text-xs py-1">
        <span class="text-slate-400">${x.lbl}</span>
        <div class="flex items-center gap-2">
          <span class="${color} font-mono">${fmt(x.val)}</span>
          <button onclick="removeBFRLine('${type}',${x.id})" class="text-slate-700 hover:text-rose-400 text-2xs transition-colors">✕</button>
        </div>
      </div>`).join('');
    const total=bfrData[type].reduce((s,x)=>s+x.val,0);
    document.getElementById('total-'+type).textContent=fmt(total);
  });
  const stocks=bfrData.stocks.reduce((s,x)=>s+x.val,0);
  const creances=bfrData.creances.reduce((s,x)=>s+x.val,0);
  const dettes=bfrData.dettes.reduce((s,x)=>s+x.val,0);
  const bfr=stocks+creances-dettes;
  document.getElementById('bfr-result').textContent=fmt(bfr);
  document.getElementById('bfr-result').className='text-4xl font-bold font-mono '+(bfr>0?'text-amber-400':bfr<0?'text-emerald-400':'text-white');
  document.getElementById('bfr-interpretation').textContent=bfr>0?'⚠ Besoin de financement : '+(fmt(bfr))+' à couvrir':bfr<0?'✓ Excédent de trésorerie : votre activité se finance d\'elle-même':'Équilibré';
  document.getElementById('bfr-icon').textContent=bfr>0?'⚠️':bfr<0?'✅':'📊';
}

function calcAcompte(){
  const total=parseFloat(document.getElementById('ac-total').value)||0;
  const pct=parseInt(document.getElementById('ac-pct').value)||30;
  const amount=total*(pct/100);
  document.getElementById('ac-preview').textContent=`Acompte ${pct}% = ${fmt(amount)} · Solde restant = ${fmt(total-amount)}`;
}

function addAcompte(){
  const client=document.getElementById('ac-client').value.trim();
  const total=parseFloat(document.getElementById('ac-total').value)||0;
  const pct=parseInt(document.getElementById('ac-pct').value)||30;
  if(!client||!total)return;
  acomptes.push({id:Date.now(),client,total,pct,amount:total*(pct/100),date:new Date().toLocaleDateString('fr-FR'),status:'en-attente'});
  SebaStorage.write('acomptes',acomptes);
  document.getElementById('ac-client').value='';
  document.getElementById('ac-total').value='';
  renderAcomptes();
}

function toggleAcompteStatus(id){
  const ac=acomptes.find(a=>a.id===id);
  if(ac) ac.status=ac.status==='encaisse'?'en-attente':'encaisse';
  SebaStorage.write('acomptes',acomptes);
  renderAcomptes();
}

function renderAcomptes(){
  document.getElementById('acomptes-list').innerHTML=acomptes.length===0
    ?'<div class="text-xs text-slate-600 font-mono text-center py-4">Aucun acompte enregistré</div>'
    :acomptes.map(a=>`
    <div class="flex items-center justify-between bg-slate-900 border border-slate-800 rounded-lg px-4 py-3">
      <div>
        <div class="text-sm font-bold text-slate-200">${a.client}</div>
        <div class="text-2xs text-slate-500 font-mono">${a.date} · Total ${fmt(a.total)} · Acompte ${a.pct}%</div>
      </div>
      <div class="flex items-center gap-3">
        <span class="text-base font-bold text-emerald-400 font-mono">${fmt(a.amount)}</span>
        <button onclick="toggleAcompteStatus(${a.id})" class="text-2xs font-bold px-2 py-1 rounded font-mono ${a.status==='encaisse'?'bg-emerald-500/10 text-emerald-400':'bg-amber-500/10 text-amber-400'}">${a.status==='encaisse'?'✓ ENCAISSÉ':'⏳ EN ATTENTE'}</button>
        <button onclick="acomptes=acomptes.filter(x=>x.id!==${a.id});SebaStorage.write('acomptes',acomptes);renderAcomptes();" class="text-slate-600 hover:text-rose-400 text-xs transition-colors">✕</button>
      </div>
    </div>`).join('');
}

renderBFR();renderAcomptes();
</script>
</body>
</html>
