<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page introuvable — Seba</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* Thème marketing sombre (même palette que index.html / onboarding.html) */
:root{--em:#0D9488;--ink:#0a0a0c;--white:#FFFFFF;--t1:rgba(255,255,255,.85);--t2:rgba(255,255,255,.5);--t3:rgba(255,255,255,.22);--bd:rgba(255,255,255,.1);--db-blue:#1D4ED8;--db-teal:#0D9488;--zinc-950:#09090B;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--ink);color:var(--white);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;-webkit-font-smoothing:antialiased;}
:focus-visible{outline:2px solid var(--em);outline-offset:3px;}
.code{font-size:clamp(4rem,18vw,8rem);font-weight:800;letter-spacing:-.05em;line-height:1;color:var(--t3);}
.code em{font-style:normal;color:var(--em);}
h1{font-size:clamp(1.2rem,4vw,1.6rem);font-weight:700;letter-spacing:-.02em;margin:18px 0 10px;}
p{color:var(--t2);font-size:.95rem;max-width:420px;line-height:1.6;margin-bottom:32px;}
.actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:13px 28px;border-radius:10px;font-size:.92rem;font-weight:700;text-decoration:none;transition:opacity .15s,border-color .2s,color .2s;}
.btn-primary{background:var(--em);color:var(--ink);}
.btn-primary:hover{opacity:.85;}
.btn-ghost{color:var(--t1);border:1px solid var(--bd);}
.btn-ghost:hover{border-color:var(--em);color:var(--em);}
/* Encre Vivante : le zero emeraude cligne en morse — le systeme vit, meme ici.
   Gate html.fx-on (hors QA / reduced-motion). */
html.fx-on .code em{color:var(--em);animation:fxMorse 3.5s steps(1) infinite;}
@keyframes fxMorse{0%,8%{opacity:1;}9%,14%{opacity:.25;}15%,22%{opacity:1;}23%,28%{opacity:.25;}29%,38%{opacity:1;}39%,50%{opacity:.25;}51%,100%{opacity:1;}}
</style>
<link rel="icon" type="image/jpeg" href="favicon.jpg">
<meta name="theme-color" content="#0a0a0c">
<style>
/* ── Harmonisation typographique Tactical Dark (spec fondateur) : Geist
   partout, letter-spacing compact et chirurgical. Bloc en fin de <head>
   pour gagner la cascade sur les styles de page. ── */
body,button,input,select,textarea{font-family:'Geist','Inter Display',Inter,sans-serif;}
h2,h3{letter-spacing:-0.04em;}
p{letter-spacing:-0.02em;}
</style>
</head>
<body>
<script>if(!navigator.webdriver&&!(window.matchMedia&&matchMedia('(prefers-reduced-motion: reduce)').matches))document.documentElement.classList.add('fx-on');</script>
<div class="code">4<em>0</em>4</div>
<h1>Cette page n'existe pas (ou plus)</h1>
<p>Le lien que vous avez suivi est peut-être cassé, ou la page a été déplacée. Rien de grave — tout le reste est à sa place.</p>
<div class="actions">
  <a href="index.html" class="btn btn-primary">Retour à l'accueil</a>
  <a href="dashboard.html" class="btn btn-ghost">Mon tableau de bord</a>
</div>
</body>
</html>
