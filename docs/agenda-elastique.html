<!DOCTYPE html>
<html lang="fr" class="h-full bg-slate-900">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seba — L'écosystème des entreprises de terrain</title>
<link rel="stylesheet" href="styles/main.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
:root{--font-sans:'Plus Jakarta Sans',sans-serif;--font-mono:'JetBrains Mono',monospace;}
body{font-family:var(--font-sans);}
.font-mono{font-family:var(--font-mono)!important;}
.text-2xs{font-size:.65rem;line-height:1rem;}
.text-3xs{font-size:.55rem;line-height:.85rem;}
.rdv-block{cursor:grab;user-select:none;transition:box-shadow .15s,opacity .15s;}
.rdv-block:active{cursor:grabbing;}
.rdv-block.dragging{opacity:.55;box-shadow:0 8px 30px rgba(0,0,0,.5);transform:scale(1.02);}
.slot-drop{transition:background .15s;}
.slot-drop.drag-over{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.4);}
.slot-row{border-bottom:1px solid rgba(51,65,85,.5);position:relative;}
.hour-label{font-family:var(--font-mono);font-size:.6rem;color:#475569;}
.new-rdv-form{display:none;}
.new-rdv-form.open{display:grid;}
</style>
  <link rel="icon" type="image/jpeg" href="favicon.jpg">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0a0c">
  <link rel="apple-touch-icon" href="icon-192.png">
  <script>if("serviceWorker" in navigator){addEventListener("load",function(){navigator.serviceWorker.register("sw.js").catch(function(){})})}</script>
  <script src="layout-manager.js"></script>
</head>
<body class="h-full text-slate-100 antialiased">

<div id="header-container" class="min-h-[63px]"></div>
<script>injectLotHeader('agenda-elastique');</script>

<main class="max-w-6xl mx-auto p-6 space-y-6">

  <!-- Contrôles semaine -->
  <div class="flex items-center justify-between">
    <div class="flex items-center gap-3">
      <button onclick="changeWeek(-1)" class="bg-slate-800 border border-slate-700 text-slate-300 px-3 py-1.5 rounded text-sm hover:text-white">←</button>
      <h2 class="text-sm font-bold text-white font-mono" id="week-label">Semaine du —</h2>
      <button onclick="changeWeek(1)" class="bg-slate-800 border border-slate-700 text-slate-300 px-3 py-1.5 rounded text-sm hover:text-white">→</button>
      <button onclick="changeWeek(0)" class="text-2xs font-bold bg-slate-900 border border-slate-700 text-slate-400 px-3 py-1.5 rounded hover:text-white transition-colors">Aujourd'hui</button>
    </div>
    <button onclick="openNewRdv()" class="text-sm font-bold bg-emerald-500 hover:bg-emerald-400 text-slate-900 px-4 py-2 rounded-lg transition-colors">+ Nouveau RDV</button>
  </div>

  <!-- Formulaire nouveau RDV -->
  <div id="new-rdv-form" class="new-rdv-form grid-cols-2 md:grid-cols-4 gap-3 bg-slate-950 border border-emerald-500/20 rounded-xl p-5">
    <input type="text" id="rdv-client" placeholder="Client / Chantier" class="bg-slate-900 border border-slate-700 rounded-lg px-3 py-2.5 text-sm text-slate-200 outline-none focus:border-emerald-500">
    <select id="rdv-day" class="bg-slate-900 border border-slate-700 rounded-lg px-3 py-2.5 text-sm text-slate-200 outline-none focus:border-emerald-500" style="background:#0f172a;">
      <option value="0">Lundi</option><option value="1">Mardi</option><option value="2">Mercredi</option>
      <option value="3">Jeudi</option><option value="4">Vendredi</option><option value="5">Samedi</option>
    </select>
    <div class="flex gap-2">
      <input type="time" id="rdv-start" value="09:00" class="flex-1 bg-slate-900 border border-slate-700 rounded-lg px-3 py-2.5 text-sm text-slate-200 outline-none focus:border-emerald-500 font-mono">
      <input type="time" id="rdv-end" value="11:00" class="flex-1 bg-slate-900 border border-slate-700 rounded-lg px-3 py-2.5 text-sm text-slate-200 outline-none focus:border-emerald-500 font-mono">
    </div>
    <div class="flex gap-2">
      <select id="rdv-type" class="flex-1 bg-slate-900 border border-slate-700 rounded-lg px-2 py-2.5 text-sm text-slate-200 outline-none focus:border-emerald-500" style="background:#0f172a;">
        <option value="intervention">Intervention</option>
        <option value="devis">Visite devis</option>
        <option value="formation">Formation</option>
        <option value="livraison">Livraison</option>
      </select>
      <button onclick="saveRdv()" class="bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-bold text-sm px-4 rounded-lg">✓</button>
      <button onclick="closeNewRdv()" class="bg-slate-800 text-slate-400 text-sm px-3 rounded-lg">✕</button>
    </div>
  </div>

  <!-- Grille agenda -->
  <div class="bg-slate-950 border border-slate-800 rounded-xl overflow-hidden">
    <!-- En-tête jours -->
    <div class="grid grid-cols-7 border-b border-slate-800 bg-slate-900/50">
      <div class="py-3 px-2"></div>
      <div id="col-lun" class="py-3 px-2 text-center"></div>
      <div id="col-mar" class="py-3 px-2 text-center"></div>
      <div id="col-mer" class="py-3 px-2 text-center"></div>
      <div id="col-jeu" class="py-3 px-2 text-center"></div>
      <div id="col-ven" class="py-3 px-2 text-center"></div>
      <div id="col-sam" class="py-3 px-2 text-center"></div>
    </div>
    <!-- Grille heures -->
    <div id="agenda-grid" class="overflow-y-auto max-h-[520px]"></div>
  </div>

</main>

<script>
const SebaStorage={write:(k,v)=>{try{localStorage.setItem('seba_'+k,JSON.stringify(v));}catch(e){}},read:(k)=>{try{const d=localStorage.getItem('seba_'+k);return d?JSON.parse(d):null;}catch(e){return null;}}};

const TYPE_COLORS={intervention:'bg-emerald-500/20 border-l-2 border-emerald-500 text-emerald-300',devis:'bg-blue-500/20 border-l-2 border-blue-500 text-blue-300',formation:'bg-violet-500/20 border-l-2 border-violet-500 text-violet-300',livraison:'bg-amber-500/20 border-l-2 border-amber-500 text-amber-300'};
const JOURS=['Lun','Mar','Mer','Jeu','Ven','Sam'];
const COL_IDS=['col-lun','col-mar','col-mer','col-jeu','col-ven','col-sam'];
const HOURS=Array.from({length:14},(_,i)=>i+7); // 7h-20h

let weekOffset=0;
let rdvs=SebaStorage.read('rdvs')||[];
let dragId=null;

function getWeekStart(offset){
  const d=new Date();
  const day=d.getDay();const diff=d.getDate()-day+(day===0?-6:1);
  d.setDate(diff+offset*7);d.setHours(0,0,0,0);return d;
}

function changeWeek(dir){
  if(dir===0) weekOffset=0;
  else weekOffset+=dir;
  renderAll();
}

function renderHeaders(){
  const ws=getWeekStart(weekOffset);
  document.getElementById('week-label').textContent='Semaine du '+ws.toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});
  JOURS.forEach((j,i)=>{
    const d=new Date(ws);d.setDate(ws.getDate()+i);
    const today=new Date();const isToday=d.toDateString()===today.toDateString();
    document.getElementById(COL_IDS[i]).innerHTML=`<div class="text-2xs font-bold ${isToday?'text-emerald-400':'text-slate-400'} font-mono">${j}</div><div class="text-sm font-bold ${isToday?'text-emerald-400':'text-slate-300'}">${d.getDate()}</div>`;
  });
}

function renderGrid(){
  const ws=getWeekStart(weekOffset);
  const grid=document.getElementById('agenda-grid');
  grid.innerHTML=HOURS.map(h=>`
    <div class="slot-row grid grid-cols-7 min-h-[56px]">
      <div class="hour-label px-2 pt-1">${String(h).padStart(2,'0')}:00</div>
      ${[0,1,2,3,4,5].map(dayIdx=>{
        const dayRdvs=rdvs.filter(r=>r.weekOffset===weekOffset&&r.day===dayIdx&&timeToHour(r.start)===h);
        return `<div class="slot-drop border-l border-slate-800/50 p-1 space-y-1" data-day="${dayIdx}" data-hour="${h}" ondragover="onDragOver(event)" ondrop="onDrop(event)" ondragleave="this.classList.remove('drag-over')">
          ${dayRdvs.map(r=>`<div class="rdv-block ${TYPE_COLORS[r.type]||TYPE_COLORS.intervention} rounded px-2 py-1 text-2xs" draggable="true" ondragstart="onDragStart(event,'${r.id}')" ondragend="onDragEnd(event)">
            <div class="font-bold truncate">${r.client}</div>
            <div class="text-3xs opacity-70 font-mono">${r.start}–${r.end}</div>
          </div>`).join('')}
        </div>`;
      }).join('')}
    </div>`).join('');
}

function renderAll(){renderHeaders();renderGrid();}

function timeToHour(t){return parseInt(t.split(':')[0]);}

function onDragStart(e,id){dragId=id;setTimeout(()=>e.target.classList.add('dragging'),0);}
function onDragEnd(e){e.target.classList.remove('dragging');dragId=null;}
function onDragOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over');}
function onDrop(e){
  e.preventDefault();e.currentTarget.classList.remove('drag-over');
  if(!dragId)return;
  const r=rdvs.find(x=>x.id===dragId);if(!r)return;
  const newDay=parseInt(e.currentTarget.dataset.day);
  const newHour=parseInt(e.currentTarget.dataset.hour);
  const dur=timeToHour(r.end)-timeToHour(r.start);
  r.day=newDay;r.weekOffset=weekOffset;
  r.start=String(newHour).padStart(2,'0')+':00';
  r.end=String(newHour+dur).padStart(2,'0')+':00';
  SebaStorage.write('rdvs',rdvs);renderGrid();
}

function openNewRdv(){document.getElementById('new-rdv-form').classList.add('open');}
function closeNewRdv(){document.getElementById('new-rdv-form').classList.remove('open');}

function saveRdv(){
  const client=document.getElementById('rdv-client').value.trim();
  if(!client)return;
  rdvs.push({id:'rdv_'+Date.now(),client,day:parseInt(document.getElementById('rdv-day').value),weekOffset,start:document.getElementById('rdv-start').value,end:document.getElementById('rdv-end').value,type:document.getElementById('rdv-type').value});
  SebaStorage.write('rdvs',rdvs);
  document.getElementById('rdv-client').value='';
  closeNewRdv();renderGrid();
}

renderAll();
</script>
</body>
</html>
