<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — Seba</title>
<link rel="icon" type="image/jpeg" href="favicon.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Inter',sans-serif;background:#0a0a0c;color:#fff;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;animation:pgFadeIn .35s ease both;}
@keyframes pgFadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
a{color:inherit;text-decoration:none;}
input,button{font-family:'Inter',sans-serif;}

/* ── Nav identique au reste du site ── */
.nav-wrap{position:fixed;top:0;left:0;right:0;z-index:200;padding:0 max(24px,calc((100vw - 1140px)/2));height:64px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;background:rgba(10,10,12,.88);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid rgba(255,255,255,.05);}
.nav-logo{font-weight:800;font-size:1.1rem;letter-spacing:-0.03em;display:flex;align-items:center;gap:8px;justify-self:start;}
.nav-logo-dot{width:8px;height:8px;border-radius:50%;background:#00ff88;box-shadow:0 0 10px rgba(0,255,136,.7);}
.nav-center{justify-self:center;display:flex;align-items:center;gap:32px;}
.nav-link{font-size:.88rem;color:rgba(255,255,255,.5);font-weight:500;transition:color .2s;}
.nav-link:hover{color:#fff;}
.nav-right{justify-self:end;display:flex;align-items:center;gap:14px;}
.nav-connexion{font-size:.85rem;color:#00ff88;font-weight:600;}
.btn-ghost-nav{display:inline-flex;align-items:center;background:transparent;color:rgba(255,255,255,.85);border:1px solid rgba(255,255,255,.18);font-weight:600;font-size:.84rem;border-radius:10px;padding:8px 18px;transition:border-color .2s,color .2s,background .2s;}
.btn-ghost-nav:hover{border-color:rgba(0,255,136,.5);color:#00ff88;background:rgba(0,255,136,.04);}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:6px;z-index:201;justify-self:end;}
.hamburger span{width:22px;height:2px;background:rgba(255,255,255,.7);border-radius:2px;transition:transform .3s,opacity .3s;display:block;}
.hamburger.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px);}
.hamburger.open span:nth-child(2){opacity:0;}
.hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px);}
.mobile-menu{position:fixed;inset:0;z-index:199;background:rgba(10,10,12,.98);backdrop-filter:blur(28px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;opacity:0;pointer-events:none;transition:opacity .3s;}
.mobile-menu.open{opacity:1;pointer-events:auto;}
.mob-link{font-size:clamp(2rem,8vw,3rem);font-weight:900;letter-spacing:-0.04em;color:rgba(255,255,255,.45);padding:10px 0;transition:color .2s;text-align:center;}
.mob-link:hover{color:#fff;}
.mob-sep{width:48px;height:1px;background:rgba(255,255,255,.08);margin:16px 0;}
.mob-conn{font-size:.9rem;color:#00ff88;font-weight:600;padding:8px 0;}
.btn-seba{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:#00ff88;color:#050508;font-weight:700;border-radius:12px;transition:box-shadow .25s,transform .2s;}
.btn-seba:hover{box-shadow:0 0 28px rgba(0,255,136,.45);transform:translateY(-2px);}

/* ── Page layout ── */
.page{flex:1;display:flex;align-items:center;justify-content:center;padding:96px 24px 60px;}

/* ── Carte glassmorphism dark ── */
.card{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.08);
  border-radius:20px;
  padding:40px;
  width:100%;max-width:400px;
  backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
  position:relative;overflow:hidden;
  box-shadow:0 32px 80px rgba(0,0,0,.4);
}
.card::before{
  content:'';position:absolute;top:-60px;left:50%;transform:translateX(-50%);
  width:280px;height:180px;
  background:radial-gradient(ellipse,rgba(0,255,136,.08) 0%,transparent 70%);
  pointer-events:none;
}

.card-logo{display:flex;align-items:center;gap:8px;margin-bottom:28px;}
.card-logo-dot{width:8px;height:8px;border-radius:50%;background:#00ff88;box-shadow:0 0 10px rgba(0,255,136,.7);}
.card-logo-text{font-weight:800;font-size:1.1rem;letter-spacing:-0.03em;}

.card-head{margin-bottom:28px;}
.card-head h1{font-size:1.45rem;font-weight:800;letter-spacing:-0.03em;color:#fff;margin-bottom:6px;}
.card-head p{font-size:.88rem;color:#94A3B8;}

/* ── Champs ── */
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.field label{font-size:.78rem;font-weight:600;color:rgba(255,255,255,.6);letter-spacing:.02em;text-transform:uppercase;}
.field input{
  padding:12px 14px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);
  border-radius:10px;
  font-size:.9rem;color:#fff;
  transition:border-color .2s,background .2s;
}
.field input::placeholder{color:rgba(255,255,255,.2);}
.field input:focus{border-color:rgba(0,255,136,.5);background:rgba(0,255,136,.04);outline:none;}

.forgot{display:flex;justify-content:flex-end;margin-top:-6px;margin-bottom:18px;}
.forgot a{font-size:.76rem;color:rgba(255,255,255,.3);transition:color .2s;}
.forgot a:hover{color:#00ff88;}

.btn-connect{
  width:100%;padding:13px;border:none;border-radius:12px;
  background:#00ff88;color:#050508;
  font-weight:700;font-size:.95rem;
  cursor:pointer;
  transition:box-shadow .25s,transform .2s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.btn-connect:hover{box-shadow:0 0 28px rgba(0,255,136,.45);transform:translateY(-2px);}
.btn-connect:active{transform:none;}
.btn-connect:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none;}

.divider{border:none;border-top:1px solid rgba(255,255,255,.07);margin:22px 0;}

.foot{text-align:center;font-size:.84rem;color:rgba(255,255,255,.35);}
.foot a{color:#00ff88;font-weight:600;transition:opacity .2s;}
.foot a:hover{opacity:.75;}

/* ── Erreur ── */
.error-msg{font-size:.82rem;color:#ff8080;background:rgba(255,100,100,.07);border:1px solid rgba(255,100,100,.18);border-radius:10px;padding:9px 12px;margin-bottom:14px;display:none;}
.error-msg.visible{display:block;}

/* ── Cursor trail ── */
#cursor-trail{position:fixed;pointer-events:none;z-index:9999;width:10px;height:10px;border-radius:50%;background:rgba(0,255,136,.35);box-shadow:0 0 14px rgba(0,255,136,.5);will-change:transform;}
@media(hover:none){#cursor-trail{display:none;}}

@media(max-width:768px){
  .nav-wrap{grid-template-columns:1fr auto;}
  .nav-center,.nav-right{display:none;}
  .hamburger{display:flex;}
}
</style>
<script src="//cdn.weglot.com/weglot.min.js"></script>
<script>Weglot.initialize({api_key:'YOUR_API_KEY_HERE'});</script>
</head>
<body>

<!-- ── Navigation ── -->
<nav class="nav-wrap">
  <a href="index.html" class="nav-logo"><span class="nav-logo-dot"></span>Seba</a>
  <div class="nav-center">
    <a href="solutions.html" class="nav-link">Product</a>
    <a href="tarifs.html"    class="nav-link">Pricing</a>
    <a href="customers.html" class="nav-link">Customers</a>
    <a href="faq.html"       class="nav-link">Resources</a>
  </div>
  <div class="nav-right">
    <a href="connexion.html" class="nav-connexion">Log in</a>
    <a href="onboarding.html" class="btn-ghost-nav">Get Started</a>
  </div>
  <button class="hamburger" id="nav-hamburger" aria-label="Menu" onclick="toggleMobileMenu()"><span></span><span></span><span></span></button>
</nav>

<div class="mobile-menu" id="mobile-menu">
  <a href="solutions.html" class="mob-link" onclick="closeMobileMenu()">Product</a>
  <a href="tarifs.html"    class="mob-link" onclick="closeMobileMenu()">Pricing</a>
  <a href="customers.html" class="mob-link" onclick="closeMobileMenu()">Customers</a>
  <a href="faq.html"       class="mob-link" onclick="closeMobileMenu()">Resources</a>
  <div class="mob-sep"></div>
  <a href="connexion.html" class="mob-conn" onclick="closeMobileMenu()">Log in</a>
  <a href="onboarding.html" class="btn-seba" style="margin-top:20px;padding:14px 40px;font-size:1rem;" onclick="closeMobileMenu()">Get Started</a>
</div>

<!-- Halo de fond -->
<div style="position:fixed;top:0;left:50%;transform:translateX(-50%);width:min(700px,100vw);height:480px;background:radial-gradient(ellipse at 50% 0%,rgba(0,255,136,.07) 0%,transparent 70%);pointer-events:none;z-index:0;"></div>

<!-- ── Formulaire ── -->
<div class="page">
  <div class="card" style="position:relative;z-index:1;">

    <div class="card-logo">
      <div class="card-logo-dot"></div>
      <div class="card-logo-text">Seba</div>
    </div>

    <div class="card-head">
      <h1>Log in</h1>
      <p>Access your Seba workspace.</p>
    </div>

    <div class="error-msg" id="error-msg">Incorrect email or password.</div>

    <div class="field">
      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="you@company.com" autocomplete="email">
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <div class="forgot"><a href="#">Forgot your password?</a></div>

    <button class="btn-connect" id="btn-connect" onclick="handleLogin()">Sign in</button>

    <hr class="divider">

    <p class="foot">
      Don't have an account?
      <a href="onboarding.html">Get Started</a>
    </p>
  </div>
</div>

<script>
function handleLogin(){
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value;
  const err=document.getElementById('error-msg');
  if(!email||!password){
    err.textContent='Please enter your email and password.';
    err.classList.add('visible');
    return;
  }
  err.classList.remove('visible');
  const btn=document.getElementById('btn-connect');
  btn.textContent='Signing in…';
  btn.disabled=true;
  setTimeout(()=>{window.location.href='dashboard.html';},600);
}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.activeElement.closest('.card'))handleLogin();});
function toggleMobileMenu(){const m=document.getElementById('mobile-menu'),b=document.getElementById('nav-hamburger');m.classList.toggle('open');b.classList.toggle('open');document.body.style.overflow=m.classList.contains('open')?'hidden':'';}
function closeMobileMenu(){document.getElementById('mobile-menu').classList.remove('open');document.getElementById('nav-hamburger').classList.remove('open');document.body.style.overflow='';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeMobileMenu();});
(function(){if(window.matchMedia('(hover:none)').matches)return;const t=document.createElement('div');t.id='cursor-trail';document.body.appendChild(t);let mx=0,my=0,tx=0,ty=0;document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});(function loop(){tx+=(mx-tx)*.12;ty+=(my-ty)*.12;t.style.transform=`translate(${tx-5}px,${ty-5}px)`;requestAnimationFrame(loop);})();})();
document.querySelectorAll('a[href]').forEach(a=>{const h=a.getAttribute('href');if(h&&!h.startsWith('#')&&!h.startsWith('http')&&!h.startsWith('mailto')){a.addEventListener('click',e=>{e.preventDefault();document.body.style.cssText='opacity:0;transition:opacity .22s ease;animation:none;';setTimeout(()=>{window.location.href=h;},230);});}});
</script>
</body>
</html>
