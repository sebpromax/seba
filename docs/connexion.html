<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — Seba</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js" defer></script>
<style>
  :root {
    --ink: #14161A;
    --emerald: #00C896;
    --plum: #3D2645;
    --bg: #FAF9F7;
    --white: #FFFFFF;
    --text-2: #6B6A6F;
    --border: #E8E6E1;
    --r: 12px;
    --rs: 8px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;}
  a{color:inherit;text-decoration:none;}
  input,button{font-family:'Inter',sans-serif;}
  :focus-visible{outline:2px solid var(--emerald);outline-offset:3px;}
  #particles-canvas{position:fixed;top:0;left:0;width:100vw;height:100vh;display:block;pointer-events:none;z-index:0;}

  /* TOP BAR */
  .topnav{display:flex;align-items:center;justify-content:space-between;padding:20px 40px;border-bottom:1px solid var(--border);}
  .logo{font-weight:700;font-size:1.2rem;display:flex;align-items:center;}
  .logo-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--emerald);margin-right:8px;flex-shrink:0;}
  .topnav-link{font-size:0.88rem;color:var(--text-2);}
  .topnav-link:hover{color:var(--ink);}

  /* MAIN */
  .page{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}

  /* CARD */
  .card{background:#fff;border:1.5px solid var(--border);border-radius:var(--r);padding:40px;width:100%;max-width:400px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
  .card-head{margin-bottom:28px;}
  .card-head h1{font-size:1.55rem;margin-bottom:6px;}
  .card-head p{font-size:0.88rem;color:var(--text-2);}

  /* FORM */
  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
  .field label{font-size:0.82rem;font-weight:500;color:var(--ink);}
  .field input{
    padding:11px 14px;border:1px solid var(--border);border-radius:var(--rs);
    font-size:0.9rem;color:var(--ink);background:var(--bg);
    transition:border-color .15s;
  }
  .field input:focus{border-color:var(--emerald);outline:none;background:#fff;}
  .field input::placeholder{color:#BBBFCA;}

  .btn-em{
    width:100%;padding:12px;border:none;border-radius:var(--rs);
    background:var(--emerald);color:var(--ink);font-weight:600;font-size:0.95rem;
    cursor:pointer;margin-top:8px;transition:opacity .15s,transform .15s;
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
  }
  .btn-em:hover{opacity:.88;transform:translateY(-1px);}
  .btn-em:active{transform:none;}

  .divider{border:none;border-top:1px solid var(--border);margin:20px 0;}

  .foot{text-align:center;font-size:0.86rem;color:var(--text-2);}
  .foot a{color:var(--emerald);font-weight:500;}
  .foot a:hover{text-decoration:underline;}

  /* ERROR */
  .error-msg{font-size:0.82rem;color:#C0392B;background:#FEE;border:1px solid #FBBABA;border-radius:var(--rs);padding:9px 12px;margin-bottom:14px;display:none;}
  .error-msg.visible{display:block;}
</style>
</head>
<body>

<nav class="topnav">
  <a href="index.html" class="logo"><span class="logo-dot"></span>Seba</a>
  <a href="onboarding.html" class="topnav-link">Pas encore de compte ? Créer mon entreprise →</a>
</nav>

<div class="page">
  <div class="card">
    <div class="card-head">
      <h1>Connexion</h1>
      <p>Accédez à votre espace Seba.</p>
    </div>

    <div class="error-msg" id="error-msg">Email ou mot de passe incorrect.</div>

    <div class="field">
      <label for="email">Adresse email</label>
      <input type="email" id="email" placeholder="votre@email.fr" autocomplete="email">
    </div>
    <div class="field">
      <label for="password">Mot de passe</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-em" id="btn-connect" onclick="handleLogin()">Se connecter</button>

    <hr class="divider">

    <p class="foot">
      Pas encore de compte ?
      <a href="onboarding.html">Créer mon entreprise</a>
    </p>
  </div>
</div>

<script>
  function handleLogin() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const err      = document.getElementById('error-msg');

    if (!email || !password) {
      err.textContent = 'Veuillez renseigner votre email et votre mot de passe.';
      err.classList.add('visible');
      return;
    }

    err.classList.remove('visible');
    const btn = document.getElementById('btn-connect');
    btn.textContent = 'Connexion…';
    btn.disabled = true;

    setTimeout(() => { window.location.href = 'dashboard.html'; }, 600);
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });
</script>
<canvas id="particles-canvas" aria-hidden="true"></canvas>
<script src="animations-vitrine.js" defer></script>
</body>
</html>
