<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — Seba</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js" defer></script>
<style>
  :root {
    --ink: #14161A;
    --emerald: #00C896;
    --plum: #3D2645;
    --bg: #FAF9F7;
    --white: #FFFFFF;
    --text-2: #6B6A6F;
    --border: #E8E6E1;
    --r: 12px;
    --rs: 8px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;}
  a{color:inherit;text-decoration:none;}
  input,button{font-family:'Inter',sans-serif;}
  :focus-visible{outline:2px solid var(--emerald);outline-offset:3px;}
  #particles-canvas{position:fixed;top:0;left:0;width:100vw;height:100vh;display:block;pointer-events:none;z-index:0;}

  .sh{position:sticky;top:0;z-index:200;background:rgba(8,9,11,.96);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,.05);}
  .sh-inner{max-width:1140px;margin:0 auto;padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:60px;}
  .sh-logo{font-size:1.15rem;font-weight:800;letter-spacing:-.03em;color:#fff;display:flex;align-items:center;gap:1px;text-decoration:none;}
  .sh-dot{color:var(--emerald);}
  .sh-burger{width:40px;height:40px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;border:1.5px solid rgba(255,255,255,.12);border-radius:8px;background:transparent;cursor:pointer;padding:0;transition:border-color .15s;}
  .sh-burger span{width:16px;height:1.5px;background:#fff;border-radius:99px;display:block;transition:transform .25s,opacity .2s;}
  .sh-burger:hover{border-color:rgba(255,255,255,.3);}
  .sh-burger.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg);}
  .sh-burger.open span:nth-child(2){opacity:0;transform:scaleX(0);}
  .sh-burger.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg);}
  .sh-overlay{position:fixed;inset:0;z-index:199;background:rgba(8,9,11,.97);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .28s ease;}
  .sh-overlay.open{opacity:1;pointer-events:auto;}
  .sh-nav{display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;}
  .sh-link{font-size:clamp(1.8rem,5vw,2.8rem);font-weight:700;color:rgba(255,255,255,.5);text-decoration:none;letter-spacing:-.03em;padding:8px 0;transition:color .15s;}
  .sh-link:hover{color:#fff;}
  .sh-cta{margin-top:24px;display:inline-block;background:var(--emerald);color:#08090B;padding:14px 36px;border-radius:8px;font-size:1rem;font-weight:700;text-decoration:none;transition:opacity .15s;}
  .sh-cta:hover{opacity:.85;}

  /* MAIN */
  .page{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}

  /* CARD */
  .card{background:#fff;border:1.5px solid var(--border);border-radius:var(--r);padding:40px;width:100%;max-width:400px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
  .card-head{margin-bottom:28px;}
  .card-head h1{font-size:1.55rem;margin-bottom:6px;}
  .card-head p{font-size:0.88rem;color:var(--text-2);}

  /* FORM */
  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
  .field label{font-size:0.82rem;font-weight:500;color:var(--ink);}
  .field input{
    padding:11px 14px;border:1px solid var(--border);border-radius:var(--rs);
    font-size:0.9rem;color:var(--ink);background:var(--bg);
    transition:border-color .15s;
  }
  .field input:focus{border-color:var(--emerald);outline:none;background:#fff;}
  .field input::placeholder{color:#BBBFCA;}

  .btn-em{
    width:100%;padding:12px;border:none;border-radius:var(--rs);
    background:var(--emerald);color:var(--ink);font-weight:600;font-size:0.95rem;
    cursor:pointer;margin-top:8px;transition:opacity .15s,transform .15s;
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
  }
  .btn-em:hover{opacity:.88;transform:translateY(-1px);}
  .btn-em:active{transform:none;}

  .divider{border:none;border-top:1px solid var(--border);margin:20px 0;}

  .foot{text-align:center;font-size:0.86rem;color:var(--text-2);}
  .foot a{color:var(--emerald);font-weight:500;}
  .foot a:hover{text-decoration:underline;}

  /* ERROR */
  .error-msg{font-size:0.82rem;color:#C0392B;background:#FEE;border:1px solid #FBBABA;border-radius:var(--rs);padding:9px 12px;margin-bottom:14px;display:none;}
  .error-msg.visible{display:block;}
</style>
</head>
<body>

<header class="sh">
  <div class="sh-inner">
    <a href="index.html" class="sh-logo">seba<span class="sh-dot">.</span></a>
    <button class="sh-burger" id="sh-burger" aria-label="Ouvrir le menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>
<div class="sh-overlay" id="sh-overlay" aria-hidden="true">
  <nav class="sh-nav">
    <a href="comment-ca-marche.html" class="sh-link">Comment ça marche</a>
    <a href="tarifs.html" class="sh-link">Tarifs</a>
    <a href="faq.html" class="sh-link">FAQ</a>
    <a href="connexion.html" class="sh-link">Connexion</a>
    <a href="onboarding.html" class="sh-cta">Créer mon entreprise →</a>
  </nav>
</div>

<div class="page">
  <div class="card">
    <div class="card-head">
      <h1>Connexion</h1>
      <p>Accédez à votre espace Seba.</p>
    </div>

    <div class="error-msg" id="error-msg">Email ou mot de passe incorrect.</div>

    <div class="field">
      <label for="email">Adresse email</label>
      <input type="email" id="email" placeholder="votre@email.fr" autocomplete="email">
    </div>
    <div class="field">
      <label for="password">Mot de passe</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-em" id="btn-connect" onclick="handleLogin()">Se connecter</button>

    <hr class="divider">

    <p class="foot">
      Pas encore de compte ?
      <a href="onboarding.html">Créer mon entreprise</a>
    </p>
  </div>
</div>

<script>
  function handleLogin() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const err      = document.getElementById('error-msg');

    if (!email || !password) {
      err.textContent = 'Veuillez renseigner votre email et votre mot de passe.';
      err.classList.add('visible');
      return;
    }

    err.classList.remove('visible');
    const btn = document.getElementById('btn-connect');
    btn.textContent = 'Connexion…';
    btn.disabled = true;

    setTimeout(() => { window.location.href = 'dashboard.html'; }, 600);
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });
</script>
<canvas id="particles-canvas" aria-hidden="true"></canvas>
<script src="animations-vitrine.js" defer></script>
<script>
(function(){
  var b=document.getElementById('sh-burger'),o=document.getElementById('sh-overlay');
  function open_(){o.classList.add('open');b.classList.add('open');b.setAttribute('aria-expanded','true');o.setAttribute('aria-hidden','false');}
  function close_(){o.classList.remove('open');b.classList.remove('open');b.setAttribute('aria-expanded','false');o.setAttribute('aria-hidden','true');}
  b.addEventListener('click',function(e){e.stopPropagation();o.classList.contains('open')?close_():open_();});
  o.addEventListener('click',function(e){if(!e.target.closest('.sh-nav'))close_();});
  document.addEventListener('keydown',function(e){if(e.key==='Escape')close_();});
})();
</script>
</body>
</html>
