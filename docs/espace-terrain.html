<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<script>(function(){try{var t=localStorage.getItem('seba_theme')||'dark';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<title>Espace terrain — Seba</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="pro-global.css">
<script src="theme.js"></script>
<!-- Page PRIVEE mais PAS guard.js : authentification universelle
     (2026-07-19) -- l'employe a sa PROPRE session Supabase Auth
     independante (comme client-espace.html), la verification se fait
     plus bas via SebaDB.employeePortal.session()/profile(), pas via un
     pre-requis de session patron sur cet appareil (ancien modele PIN,
     retire). -->
<script src="auth.js"></script>
<style>
:root{--danger-text:#EF4444;--danger-bg:rgba(239,68,68,.08);--danger-border:rgba(239,68,68,.22);--modal-overlay-bg:rgba(0,0,0,.5);}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{overflow-x:hidden;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh;min-height:100dvh;}
a{color:inherit;text-decoration:none;}
button,input,textarea{font-family:'Inter',sans-serif;}

.et-wrap{max-width:640px;margin:0 auto;padding:24px 20px 60px;padding-bottom:max(60px, calc(20px + env(safe-area-inset-bottom, 0px)));}

.et-header{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:24px;}
.et-greeting h1{font-size:1.4rem;font-weight:800;letter-spacing:-0.02em;margin-bottom:4px;}
.et-greeting p{font-size:.86rem;color:var(--text-2);}
.et-logout{background:var(--danger-bg);color:var(--danger-text);border:1px solid var(--danger-border);padding:9px 16px;border-radius:var(--rs);font-size:.84rem;font-weight:600;cursor:pointer;white-space:nowrap;min-height:48px;}

.et-section-title{font-size:.78rem;text-transform:uppercase;letter-spacing:.04em;color:var(--emerald);font-weight:700;margin-bottom:12px;}

.et-mission{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:18px 20px;margin-bottom:12px;transition:opacity var(--t-std,.25s) var(--ease-std,ease);}
.et-mission.done{opacity:.6;}
.et-mission-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.et-mission-time{font-size:.82rem;font-weight:700;color:var(--emerald);}
.et-mission-badge{font-size:.72rem;padding:3px 9px;border-radius:12px;font-weight:600;background:var(--bg);color:var(--text-2);}
.et-mission-badge.done{background:var(--badge-success-bg);color:var(--emerald);}
.et-mission-client{font-weight:600;font-size:1rem;margin-bottom:2px;}
.et-mission-service{font-size:.86rem;color:var(--text-2);margin-bottom:12px;}
.et-mission-actions{display:flex;gap:8px;flex-wrap:wrap;}
.et-btn-msg{background:var(--bg);border:1px solid var(--border);color:var(--ink);padding:8px 14px;border-radius:var(--rs);font-size:.82rem;font-weight:600;cursor:pointer;min-height:48px;}
.et-btn-terminer{background:var(--emerald);border:none;color:var(--on-emerald);padding:8px 14px;border-radius:var(--rs);font-size:.82rem;font-weight:700;cursor:pointer;min-height:48px;}
@media (hover:hover){.et-btn-terminer:hover{opacity:.9;}}
@media (hover:none){.et-btn-terminer:active{opacity:.85;}}

.et-empty{text-align:center;padding:40px 20px;color:var(--text-2);font-size:.9rem;background:var(--white);border:1.5px dashed var(--border);border-radius:var(--r);}

.et-messaging{margin-top:32px;background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:20px;}
.et-msg-thread{max-height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
.et-msg-bubble{background:var(--bg);border-radius:10px;padding:9px 12px;font-size:.86rem;}
.et-msg-meta{font-size:.72rem;color:var(--text-2);margin-top:3px;}
.et-msg-empty{font-size:.84rem;color:var(--text-2);text-align:center;padding:12px 0;}
.et-msg-row{display:flex;gap:8px;}
.et-msg-input{flex:1;min-width:0;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--rs);background:var(--bg);color:var(--ink);font-size:.88rem;min-height:48px;-webkit-appearance:none;appearance:none;}
.et-msg-input:focus{border-color:var(--emerald);outline:none;}
.et-msg-send{background:var(--emerald);color:var(--on-emerald);border:none;padding:0 18px;border-radius:var(--rs);font-weight:700;font-size:.86rem;cursor:pointer;min-height:48px;flex-shrink:0;}
.et-msg-send:disabled,.et-btn-msg:disabled{opacity:.5;cursor:not-allowed;}

@media (hover: hover) {
  .et-logout:hover{opacity:.85;}
  .et-btn-msg:hover{border-color:var(--emerald);color:var(--emerald);}
}
@media (hover: none) {
  .et-logout:active{opacity:.75;}
  .et-btn-msg:active{border-color:var(--emerald);color:var(--emerald);}
}

/* Modal message rapide (repli, missions sans requestId -- creees avant
   assignation.html ou hors de ce flux) */
.et-modal-overlay{position:fixed;inset:0;background:var(--modal-overlay-bg);display:none;align-items:center;justify-content:center;z-index:500;padding:20px;}
.et-modal-overlay.open{display:flex;}
.et-modal{background:var(--white);border-radius:var(--r);padding:24px;width:100%;max-width:360px;}
.et-modal h3{font-size:1rem;margin-bottom:4px;}
.et-modal p{font-size:.82rem;color:var(--text-2);margin-bottom:14px;}
.et-modal textarea{width:100%;min-height:90px;padding:12px;border:1.5px solid var(--border);border-radius:var(--rs);background:var(--bg);color:var(--ink);font-size:.88rem;resize:vertical;margin-bottom:14px;font-family:'Inter',sans-serif;-webkit-appearance:none;appearance:none;}
.et-modal textarea:focus{border-color:var(--emerald);outline:none;}
.et-modal-actions{display:flex;gap:10px;}
.et-modal-actions button{flex:1;padding:11px;border-radius:var(--rs);font-size:.86rem;font-weight:600;cursor:pointer;min-height:48px;}
.et-modal-cancel{background:var(--bg);border:1px solid var(--border);color:var(--ink);}
.et-modal-send{background:var(--emerald);border:none;color:var(--on-emerald);}
.et-modal-send:disabled{opacity:.5;cursor:not-allowed;}

/* ── Chat de mission (tripartite Patron/Employé/Client, 2026-07-20) --
   meme composant que client-espace.html (bulles droite/gauche, feuille
   ancree en bas sur mobile pour rester au-dessus du clavier). ── */
.mc-overlay{position:fixed;inset:0;background:var(--modal-overlay-bg);display:none;align-items:flex-end;justify-content:center;z-index:600;}
.mc-overlay.open{display:flex;}
.mc-panel{background:var(--white);width:100%;max-width:480px;border-radius:var(--r) var(--r) 0 0;display:flex;flex-direction:column;max-height:85vh;max-height:85dvh;}
@media (min-width:640px){
  .mc-overlay{align-items:center;padding:20px;}
  .mc-panel{border-radius:var(--r);max-height:80vh;max-height:80dvh;}
}
.mc-header{display:flex;justify-content:space-between;align-items:flex-start;padding:18px 20px;border-bottom:1px solid var(--border);gap:12px;flex-shrink:0;}
.mc-title{font-weight:700;font-size:1rem;}
.mc-sub{font-size:.8rem;color:var(--text-2);margin-top:2px;}
.mc-close{background:none;border:none;font-size:1.3rem;color:var(--text-2);cursor:pointer;line-height:1;padding:6px;min-width:48px;min-height:48px;flex-shrink:0;}
.mc-thread{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px;}
.mc-row{display:flex;flex-direction:column;max-width:78%;}
.mc-row.self{align-self:flex-end;align-items:flex-end;}
.mc-row.other{align-self:flex-start;align-items:flex-start;}
.mc-author{font-size:.72rem;color:var(--text-2);margin-bottom:3px;padding:0 3px;font-weight:600;}
.mc-bubble{padding:9px 13px;border-radius:14px;font-size:.88rem;line-height:1.4;word-break:break-word;}
.mc-row.self .mc-bubble{background:var(--emerald);color:var(--on-emerald);border-bottom-right-radius:4px;}
.mc-row.other .mc-bubble{background:var(--bg);color:var(--ink);border:1px solid var(--border);border-bottom-left-radius:4px;}
.mc-empty{text-align:center;color:var(--text-2);font-size:.86rem;padding:28px 0;}
.mc-input-row{display:flex;gap:8px;padding:14px 16px;border-top:1px solid var(--border);flex-shrink:0;padding-bottom:max(14px, calc(10px + env(safe-area-inset-bottom,0px)));}
.mc-input{flex:1;min-width:0;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--rs);background:var(--bg);color:var(--ink);font-size:16px;min-height:48px;-webkit-appearance:none;appearance:none;}
.mc-input:focus{border-color:var(--emerald);outline:none;}
.mc-send{background:var(--emerald);color:var(--on-emerald);border:none;padding:0 18px;border-radius:var(--rs);font-weight:700;font-size:.86rem;cursor:pointer;min-height:48px;flex-shrink:0;}
.mc-send:disabled{opacity:.5;cursor:not-allowed;}

.et-pw-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.et-pw-row input{flex:1;min-width:120px;min-height:48px;-webkit-appearance:none;appearance:none;}

/* ── Clôture de mission (2026-07-20) -- meme feuille ancree en bas sur
   mobile que .mc-panel, corps scrollable independant du header/footer
   fixes (textarea + bouton photo peuvent depasser la hauteur visible
   sans jamais masquer les actions ni le champ de saisie). ── */
.cm-overlay{position:fixed;inset:0;background:var(--modal-overlay-bg);display:none;align-items:flex-end;justify-content:center;z-index:600;}
.cm-overlay.open{display:flex;}
.cm-panel{background:var(--white);width:100%;max-width:480px;border-radius:var(--r) var(--r) 0 0;display:flex;flex-direction:column;max-height:90vh;max-height:90dvh;}
@media (min-width:640px){
  .cm-overlay{align-items:center;padding:20px;}
  .cm-panel{border-radius:var(--r);max-height:85vh;max-height:85dvh;}
}
.cm-header{display:flex;justify-content:space-between;align-items:flex-start;padding:18px 20px;border-bottom:1px solid var(--border);gap:12px;flex-shrink:0;}
.cm-title{font-weight:700;font-size:1rem;}
.cm-sub{font-size:.8rem;color:var(--text-2);margin-top:2px;}
.cm-close{background:none;border:none;font-size:1.3rem;color:var(--text-2);cursor:pointer;line-height:1;padding:6px;min-width:48px;min-height:48px;flex-shrink:0;}
.cm-body{flex:1;overflow-y:auto;padding:18px 20px;}
.cm-label{display:block;font-size:.76rem;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:.02em;margin-bottom:8px;}
.cm-textarea{width:100%;min-height:110px;padding:12px;border:1.5px solid var(--border);border-radius:var(--rs);background:var(--bg);color:var(--ink);font-size:16px;resize:vertical;font-family:'Inter',sans-serif;-webkit-appearance:none;appearance:none;margin-bottom:18px;}
.cm-textarea:focus{border-color:var(--emerald);outline:none;}
.cm-photo-btn{width:100%;background:var(--bg);border:1.5px dashed var(--border);color:var(--ink);padding:12px;border-radius:var(--rs);font-size:.86rem;font-weight:600;cursor:pointer;min-height:48px;}
@media (hover:hover){.cm-photo-btn:hover{border-color:var(--emerald);color:var(--emerald);}}
@media (hover:none){.cm-photo-btn:active{border-color:var(--emerald);color:var(--emerald);}}
.cm-photo-name{font-size:.8rem;color:var(--emerald);margin-top:8px;}
.cm-actions{display:flex;gap:10px;padding:16px 20px;border-top:1px solid var(--border);flex-shrink:0;padding-bottom:max(16px, calc(12px + env(safe-area-inset-bottom,0px)));}
.cm-actions button{flex:1;padding:12px;border-radius:var(--rs);font-size:.9rem;font-weight:700;cursor:pointer;min-height:48px;}
.cm-cancel{background:var(--bg);border:1px solid var(--border);color:var(--ink);}
.cm-validate{background:var(--emerald);border:none;color:var(--on-emerald);}
.cm-validate:disabled{opacity:.5;cursor:not-allowed;}

@media (max-width: 768px) {
  .et-msg-input,.et-modal textarea,.et-pw-row input,.cm-textarea{font-size:16px;}
  .et-mission-actions{gap:12px;}
}
</style>
</head>
<body>

<div class="et-wrap" id="et-wrap" style="display:none;">
  <div class="et-header">
    <div class="et-greeting">
      <h1 id="et-greeting">Bonjour</h1>
      <p id="et-date"></p>
    </div>
    <button class="et-logout" onclick="handleLogout()">Se déconnecter</button>
  </div>

  <div class="et-section-title">Planning du jour</div>
  <div id="et-missions"></div>

  <div class="et-messaging">
    <div class="et-section-title" style="margin-bottom:14px;">Messages</div>
    <div class="et-msg-thread" id="et-msg-thread"></div>
    <div class="et-msg-row">
      <input type="text" class="et-msg-input" id="et-msg-input" placeholder="Écrire à votre patron..." onkeydown="if(event.key==='Enter')envoyerMessagePatron();">
      <button class="et-msg-send" onclick="envoyerMessagePatron()">Envoyer</button>
    </div>
  </div>

  <div class="et-messaging" id="et-pw-panel">
    <div class="et-section-title" style="margin-bottom:14px;">Mon mot de passe</div>
    <p style="font-size:.84rem;color:var(--text-2);margin-bottom:12px;">Changez votre mot de passe à tout moment.</p>
    <div class="et-pw-row">
      <input type="password" class="et-msg-input" id="et-pw-new" placeholder="Nouveau mot de passe" minlength="6">
      <input type="password" class="et-msg-input" id="et-pw-confirm" placeholder="Confirmez" minlength="6">
    </div>
    <button class="et-msg-send" style="width:100%;padding:11px;" onclick="modifierMonMotDePasse()">Modifier mon mot de passe</button>
    <p id="et-pw-status" style="font-size:.82rem;margin-top:8px;"></p>
  </div>
</div>

<div class="et-loading" id="et-loading" style="text-align:center;padding:60px 20px;color:var(--text-2);font-size:.9rem;">Chargement…</div>

<!-- Repli : missions sans requestId (creees avant assignation.html) -->
<div class="et-modal-overlay" id="et-modal-overlay">
  <div class="et-modal">
    <h3 id="et-modal-title">Message</h3>
    <p id="et-modal-sub">À propos de cette intervention.</p>
    <textarea id="et-modal-text" placeholder="Votre message..."></textarea>
    <div class="et-modal-actions">
      <button class="et-modal-cancel" onclick="closeMissionModal()">Annuler</button>
      <button class="et-modal-send" onclick="envoyerMessageMission()">Envoyer</button>
    </div>
  </div>
</div>

<!-- Chat de mission (tripartite) -- missions avec requestId -->
<div class="mc-overlay" id="mc-overlay">
  <div class="mc-panel" role="dialog" aria-modal="true" aria-label="Chat de la mission">
    <div class="mc-header">
      <div>
        <div class="mc-title" id="mc-title">Chat</div>
        <div class="mc-sub" id="mc-sub"></div>
      </div>
      <button class="mc-close" onclick="closeMissionChat()" aria-label="Fermer">&times;</button>
    </div>
    <div class="mc-thread" id="mc-thread-mission"></div>
    <div class="mc-input-row">
      <input type="text" class="mc-input" id="mc-input" placeholder="Écrire un message..." onkeydown="if(event.key==='Enter')sendMissionChatMessage();">
      <button class="mc-send" id="mc-send" onclick="sendMissionChatMessage()">Envoyer</button>
    </div>
  </div>
</div>

<!-- Clôture de mission -->
<div class="cm-overlay" id="cm-overlay">
  <div class="cm-panel" role="dialog" aria-modal="true" aria-label="Clôturer la mission">
    <div class="cm-header">
      <div>
        <div class="cm-title">Clôturer la mission</div>
        <div class="cm-sub" id="cm-sub"></div>
      </div>
      <button class="cm-close" onclick="closeCloseMissionModal()" aria-label="Fermer">&times;</button>
    </div>
    <div class="cm-body">
      <label class="cm-label" for="cm-notes">Notes et rapport de fin d'intervention</label>
      <textarea id="cm-notes" class="cm-textarea" placeholder="Ex : ménage complet effectué, rien à signaler..."></textarea>
      <label class="cm-label" for="cm-photo">Photo</label>
      <button type="button" class="cm-photo-btn" onclick="document.getElementById('cm-photo').click()">📷 Ajouter une photo</button>
      <input type="file" id="cm-photo" accept="image/*" capture="environment" style="display:none;" onchange="handlePhotoSelected()">
      <div class="cm-photo-name" id="cm-photo-name"></div>
      <p id="cm-status" style="font-size:.82rem;margin-top:10px;color:var(--danger-text);"></p>
    </div>
    <div class="cm-actions">
      <button class="cm-cancel" onclick="closeCloseMissionModal()">Annuler</button>
      <button class="cm-validate" id="cm-validate" onclick="validerCloture()">Valider la clôture</button>
    </div>
  </div>
</div>

<script src="seba-data.js"></script>
<script src="services/message-log.js"></script>
<script>
(function(){
  const c = localStorage.getItem('user_theme_color');
  if (c) document.documentElement.style.setProperty('--emerald', c);
})();

/* Date ISO en heure LOCALE, meme convention que seba-data.js (localISO) --
   jamais toISOString() qui peut basculer au jour precedent en UTC. */
function todayISOLocal() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

let _profile = null; // { employe, account, employe_id }
let _missionContext = null; // intervention ciblee par le modal Message

(async function init() {
  if (!window.SebaDB) return;
  const session = await SebaDB.employeePortal.session();
  if (!session) { window.location.href = 'employe-connexion.html'; return; }

  _profile = await SebaDB.employeePortal.profile();
  if (!_profile || !_profile.ok) {
    window.location.href = 'employe-connexion.html';
    return;
  }

  document.getElementById('et-loading').style.display = 'none';
  document.getElementById('et-wrap').style.display = 'block';

  const emp = _profile.employe || {};
  document.getElementById('et-greeting').textContent = 'Bonjour ' + (emp.prenom || '');
  document.getElementById('et-date').textContent = new Date().toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });

  renderMissions();
  renderMessages();
})();

async function modifierMonMotDePasse() {
  const newPw = document.getElementById('et-pw-new').value;
  const confirmPw = document.getElementById('et-pw-confirm').value;
  const status = document.getElementById('et-pw-status');
  if (newPw.length < 6) {
    status.textContent = 'Le mot de passe doit contenir au moins 6 caractères.';
    status.style.color = 'var(--danger-text)';
    return;
  }
  if (newPw !== confirmPw) {
    status.textContent = 'Les deux mots de passe ne correspondent pas.';
    status.style.color = 'var(--danger-text)';
    return;
  }
  const btn = document.querySelector('#et-pw-panel .et-msg-send');
  if (btn.disabled) return; // anti double-tap : requête déjà en vol
  btn.disabled = true;
  status.textContent = 'Enregistrement…';
  status.style.color = '';
  const res = await SebaDB.employeePortal.setPassword(newPw);
  btn.disabled = false;
  if (res.ok) {
    status.textContent = 'Mot de passe modifié.';
    status.style.color = 'var(--emerald)';
    document.getElementById('et-pw-new').value = '';
    document.getElementById('et-pw-confirm').value = '';
  } else {
    status.textContent = res.error || 'Échec de la modification.';
    status.style.color = 'var(--danger-text)';
  }
}

/* Planning du jour -- via employeePortal.interventionsForDate() (RPC
   get_my_employee_interventions cote Supabase, l'employe ne peut pas lire
   le blob JSONB du patron directement -- filtre local en mode demo).
   Interventions n'ont AUCUN champ financier (clientId/clientName/service/
   date/time/done/employeId uniquement) : le CA est donc structurellement
   absent de cette vue, jamais masque a la volee -- il n'y a rien a
   retirer. */
let _missionsById = {};

async function renderMissions() {
  const box = document.getElementById('et-missions');
  const today = todayISOLocal();
  const res = await SebaDB.employeePortal.interventionsForDate(today);
  const missions = ((res && res.interventions) || []).slice().sort((a, b) => (a.time || '').localeCompare(b.time || ''));
  _missionsById = {};
  missions.forEach(m => { _missionsById[m.id] = m; });

  if (!missions.length) {
    box.innerHTML = '<div class="et-empty">Aucune mission assignée pour aujourd\'hui.</div>';
    return;
  }

  box.innerHTML = missions.map(m => (
    '<div class="et-mission' + (m.done ? ' done' : '') + '">' +
      '<div class="et-mission-top">' +
        '<span class="et-mission-time">' + (m.time || '') + '</span>' +
        '<span class="et-mission-badge' + (m.done ? ' done' : '') + '">' + (m.done ? 'Terminée' : 'À faire') + '</span>' +
      '</div>' +
      '<div class="et-mission-client">' + escapeHtml(m.clientName || 'Client') + '</div>' +
      '<div class="et-mission-service">' + escapeHtml(m.service || '') + '</div>' +
      '<div class="et-mission-actions">' +
        (m.requestId
          ? '<button class="et-btn-msg" onclick="openMissionChat(\'' + m.id + '\')">💬 Chat</button>'
          : '<button class="et-btn-msg" onclick="openMissionModal(\'' + m.id + '\',\'' + escapeHtml(m.clientName || '').replace(/'/g, "\\'") + '\')">Message</button>') +
        (!m.done ? '<button class="et-btn-terminer" onclick="openCloseMissionModal(\'' + m.id + '\')">✓ Terminer la mission</button>' : '') +
      '</div>' +
    '</div>'
  )).join('');
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function openMissionModal(interventionId, clientName) {
  _missionContext = { interventionId, clientName };
  document.getElementById('et-modal-title').textContent = 'Message — ' + clientName;
  document.getElementById('et-modal-sub').textContent = 'Ce message est envoyé à votre patron, pas au client.';
  document.getElementById('et-modal-text').value = '';
  document.getElementById('et-modal-overlay').classList.add('open');
}
function closeMissionModal() {
  document.getElementById('et-modal-overlay').classList.remove('open');
  _missionContext = null;
}
async function envoyerMessageMission() {
  const texte = document.getElementById('et-modal-text').value.trim();
  if (!texte || !_missionContext) return;
  const btn = document.querySelector('.et-modal-send');
  if (btn.disabled) return; // anti double-tap
  btn.disabled = true;
  const prefixed = '[' + _missionContext.clientName + '] ' + texte;
  await window.SebaQuotes.createMessage({
    account: _profile.account, employeId: _profile.employe_id, expediteurRole: 'employe', destinataireRole: 'patron', texte: prefixed,
  });
  btn.disabled = false;
  closeMissionModal();
  renderMessages();
}

async function renderMessages() {
  const box = document.getElementById('et-msg-thread');
  if (!window.SebaQuotes || !window.SebaQuotes.messagesFor) return;
  const msgs = await window.SebaQuotes.messagesFor('employe', _profile.employe_id, _profile.account);
  box.innerHTML = msgs.length
    ? msgs.map(m => '<div class="et-msg-bubble">' + escapeHtml(m.texte) +
        '<div class="et-msg-meta">' + (m.expediteurRole === 'patron' ? 'Votre patron' : 'Vous') + ' · ' + (m.createdAt || '') + '</div></div>').join('')
    : '<div class="et-msg-empty">Aucun message pour l\'instant.</div>';
  box.scrollTop = box.scrollHeight;
}

async function envoyerMessagePatron() {
  const inp = document.getElementById('et-msg-input');
  const texte = inp.value.trim();
  if (!texte) return;
  const btn = document.querySelector('.et-msg-row .et-msg-send');
  if (btn.disabled) return; // anti double-tap
  btn.disabled = true;
  await window.SebaQuotes.createMessage({
    account: _profile.account, employeId: _profile.employe_id, expediteurRole: 'employe', destinataireRole: 'patron', texte,
  });
  inp.value = '';
  btn.disabled = false;
  renderMessages();
}

let _loggingOut = false;
async function handleLogout() {
  if (_loggingOut) return; // anti double-tap
  _loggingOut = true;
  await SebaDB.employeePortal.logout();
  window.location.href = 'employe-connexion.html';
}

// ── Chat de mission (tripartite) ──────────────────────────────────────
// Ancré sur request_id (present sur les missions creees via
// assignation.html) -- distinct du fil generique "Messages" ci-dessus.
let _missionChatRequestId = null;
function missionChatAuthor(m, mission) {
  if (m.expediteurRole === 'employe') return null; // self, pas de nom au-dessus
  if (m.expediteurRole === 'client') return (mission && mission.clientName) || 'Client';
  return 'Votre patron';
}
function openMissionChat(interventionId) {
  const mission = _missionsById[interventionId];
  if (!mission || !mission.requestId) return;
  _missionChatRequestId = mission.requestId;
  document.getElementById('mc-title').textContent = 'Chat — ' + (mission.service || 'Mission');
  document.getElementById('mc-sub').textContent = 'Avec ' + (mission.clientName || 'le client');
  document.getElementById('mc-input').value = '';
  document.getElementById('mc-overlay').classList.add('open');
  renderMissionChatThread(mission);
  setTimeout(() => document.getElementById('mc-input').focus(), 150);
}
function closeMissionChat() {
  document.getElementById('mc-overlay').classList.remove('open');
  _missionChatRequestId = null;
}
async function renderMissionChatThread(mission) {
  const box = document.getElementById('mc-thread-mission');
  if (!_missionChatRequestId) return;
  const msgs = await window.SebaQuotes.messagesForRequest(_missionChatRequestId, _profile.account);
  if (!msgs.length) {
    box.innerHTML = '<div class="mc-empty">Aucun message pour l\'instant. Écrivez le premier.</div>';
    return;
  }
  box.innerHTML = msgs.map(m => {
    const self = m.expediteurRole === 'employe';
    const author = missionChatAuthor(m, mission);
    return '<div class="mc-row ' + (self ? 'self' : 'other') + '">' +
      (author ? '<div class="mc-author">' + escapeHtml(author) + '</div>' : '') +
      '<div class="mc-bubble">' + escapeHtml(m.texte) + '</div>' +
    '</div>';
  }).join('');
  box.scrollTop = box.scrollHeight;
}
async function sendMissionChatMessage() {
  const inp = document.getElementById('mc-input');
  const texte = inp.value.trim();
  if (!texte || !_missionChatRequestId) return;
  const btn = document.getElementById('mc-send');
  if (btn.disabled) return; // anti double-tap
  btn.disabled = true;
  await window.SebaQuotes.createMessage({
    account: _profile.account, employeId: _profile.employe_id, requestId: _missionChatRequestId,
    expediteurRole: 'employe', destinataireRole: 'patron', texte,
  });
  inp.value = '';
  btn.disabled = false;
  const mission = Object.values(_missionsById).find(m => m.requestId === _missionChatRequestId);
  renderMissionChatThread(mission);
}

// ── Clôture de mission ("Terminer la mission", 2026-07-20) ─────────────
let _closingInterventionId = null;
let _closingPhotoFile = null;
function openCloseMissionModal(interventionId) {
  const mission = _missionsById[interventionId];
  if (!mission) return;
  _closingInterventionId = interventionId;
  _closingPhotoFile = null;
  document.getElementById('cm-sub').textContent = (mission.clientName || 'Client') + ' — ' + (mission.service || '');
  document.getElementById('cm-notes').value = '';
  document.getElementById('cm-photo').value = '';
  document.getElementById('cm-photo-name').textContent = '';
  const status = document.getElementById('cm-status');
  status.textContent = '';
  status.style.color = 'var(--danger-text)';
  document.getElementById('cm-overlay').classList.add('open');
}
function closeCloseMissionModal() {
  document.getElementById('cm-overlay').classList.remove('open');
  _closingInterventionId = null;
}
function handlePhotoSelected() {
  const inp = document.getElementById('cm-photo');
  const file = inp.files && inp.files[0];
  _closingPhotoFile = file || null;
  document.getElementById('cm-photo-name').textContent = file ? ('📎 ' + file.name) : '';
}
// Nom de fichier "propre" pour le chemin de stockage : jamais les
// caracteres du nom d'origine tels quels (espaces, accents, etc. posent
// probleme dans une cle d'objet Storage).
function sanitizeFileName(name) {
  return String(name || 'photo.jpg').toLowerCase().replace(/[^a-z0-9.]+/g, '-').replace(/-+/g, '-').replace(/^-+|-+$/g, '');
}

// Upload direct vers mission-photos (le JWT de l'employe, jamais
// service_role -- les policies RLS du bucket font le travail
// d'autorisation, voir supabase-schema.sql section 37). Ne bloque JAMAIS
// la cloture : un echec d'upload (reseau, session expiree...) est
// signale dans le statut de la modale, la mission se cloture quand meme,
// simplement sans photo. En mode demo/local (pas de vrai bucket), un
// chemin factice mais de forme identique est simule pour que l'affichage
// cote patron/client (bouton "Voir la photo") reste testable.
async function uploadClosurePhoto(requestId) {
  if (!_closingPhotoFile) return { path: null, warning: null };
  if (!requestId) return { path: null, warning: 'Photo non envoyée : aucune demande liée à cette mission.' };

  if (!(window.SEBA_CONFIG && window.SEBA_CONFIG.supabaseUrl) || !window.sebaAuth || !sebaAuth.isConfigured) {
    // Mode demo/local : aucun vrai bucket -- simule un chemin de meme forme.
    const fakePath = requestId + '/' + Date.now() + '_' + sanitizeFileName(_closingPhotoFile.name);
    return { path: fakePath, warning: null };
  }

  const path = requestId + '/' + Date.now() + '_' + sanitizeFileName(_closingPhotoFile.name);
  const up = await sebaAuth.uploadFile('mission-photos', path, _closingPhotoFile);
  if (!up.ok) return { path: null, warning: 'Photo non envoyée (' + up.error + '), rapport enregistré quand même.' };
  return { path: up.path, warning: null };
}

async function validerCloture() {
  if (!_closingInterventionId) return;
  const mission = _missionsById[_closingInterventionId];
  const notes = document.getElementById('cm-notes').value.trim();
  const btn = document.getElementById('cm-validate');
  if (btn.disabled) return; // anti double-tap : requête déjà en vol
  btn.disabled = true;
  btn.textContent = _closingPhotoFile ? 'Envoi de la photo…' : 'Validation…';

  const { path: photoPath, warning } = await uploadClosurePhoto(mission && mission.requestId);

  btn.textContent = 'Validation…';

  // Ecriture unique cote serveur (RPC close_my_intervention, SECURITY
  // DEFINER) : met a jour l'intervention (done/rapport/rapportPhotoPath)
  // ET la client_request liee (statut "terminee" + photo_path) dans la
  // meme transaction -- l'employe n'a aucun droit d'ecriture direct sur
  // ni l'une ni l'autre (voir seba-data.js: employeePortal.closeIntervention).
  const res = await SebaDB.employeePortal.closeIntervention(_closingInterventionId, notes, photoPath);

  btn.disabled = false;
  btn.textContent = 'Valider la clôture';

  if (!res.ok) {
    document.getElementById('cm-status').textContent = res.error || 'Échec de la clôture.';
    return;
  }

  // Cloture reussie meme si la photo a echoue (jamais bloquant) -- mais
  // dans ce cas precis on laisse la modale ouverte un instant avec le
  // message, plutot que de la refermer sans que l'employe ait pu le lire.
  await renderMissions();
  if (warning) {
    document.getElementById('cm-status').style.color = 'var(--emerald)';
    document.getElementById('cm-status').textContent = 'Mission clôturée. ' + warning;
    return;
  }
  closeCloseMissionModal();
}
</script>
