<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<script>(function(){try{var t=localStorage.getItem('seba_theme')||'dark';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<title>Espace Client — Seba</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="pro-global.css">
<script src="theme.js"></script>
<!-- Page PRIVEE mais PAS guard.js : contrairement a l'espace terrain
     (badge sur l'appareil patron), le client a sa PROPRE session
     Supabase Auth independante -- la verification se fait plus bas via
     SebaDB.clientPortal.session()/profile(), pas via un pre-requis de
     session patron sur cet appareil. -->
<script src="auth.js"></script>
<style>
:root{--danger-text:#EF4444;--danger-bg:rgba(239,68,68,.08);--danger-border:rgba(239,68,68,.22);--modal-overlay-bg:rgba(0,0,0,.5);}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{overflow-x:hidden;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh;min-height:100dvh;}
a{color:inherit;text-decoration:none;}
button,input,textarea{font-family:'Inter',sans-serif;}

.ce-wrap{max-width:680px;margin:0 auto;padding:24px 20px 60px;padding-bottom:max(60px, calc(20px + env(safe-area-inset-bottom, 0px)));}

.ce-header{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:24px;flex-wrap:wrap;}
.ce-brand{display:flex;align-items:center;gap:8px;font-size:1.05rem;font-weight:800;letter-spacing:-0.03em;width:100%;margin-bottom:8px;}
.ce-brand-dot{width:8px;height:8px;border-radius:50%;background:var(--emerald);flex-shrink:0;}
.ce-brand .b-se{color:var(--ink);}
.ce-brand .b-ba{font-weight:300;color:var(--text-2);}
.ce-greeting h1{font-size:1.4rem;font-weight:800;letter-spacing:-0.02em;margin-bottom:4px;}
.ce-greeting p{font-size:.86rem;color:var(--text-2);}
.ce-actions{display:flex;gap:10px;flex-wrap:wrap;}
.ce-btn-new{background:var(--emerald);color:var(--on-emerald);border:none;padding:10px 18px;border-radius:var(--rs);font-size:.86rem;font-weight:700;cursor:pointer;min-height:48px;}
.ce-logout{background:var(--danger-bg);color:var(--danger-text);border:1px solid var(--danger-border);padding:10px 16px;border-radius:var(--rs);font-size:.84rem;font-weight:600;cursor:pointer;white-space:nowrap;min-height:48px;}
@media (hover: hover) {
  .ce-btn-new:hover{opacity:.9;}
  .ce-logout:hover{opacity:.85;}
}
@media (hover: none) {
  .ce-btn-new:active{opacity:.85;}
  .ce-logout:active{opacity:.75;}
}

.ce-section-title{font-size:.78rem;text-transform:uppercase;letter-spacing:.04em;color:var(--emerald);font-weight:700;margin-bottom:12px;}
.ce-section-title.ce-section-title-2{margin-top:32px;}

.ce-request-grid{display:grid;grid-template-columns:1fr;gap:12px;}
.ce-request{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:16px 20px;transition:border-color var(--t-std,.25s) var(--ease-std,ease),box-shadow var(--t-std,.25s) var(--ease-std,ease);}
@media (hover: hover) {
  .ce-request:hover{border-color:var(--module-hover-border);box-shadow:var(--shadow-glow);}
}
@media (hover: none) {
  .ce-request:active{border-color:var(--module-hover-border);}
}
.ce-request-top{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:6px;}
.ce-request-title{font-weight:600;font-size:.96rem;}
.ce-badge{font-size:.72rem;padding:3px 10px;border-radius:12px;font-weight:600;white-space:nowrap;background:var(--bg);color:var(--text-2);}
.ce-badge.nouvelle{background:var(--badge-info-bg);color:var(--text-2);}
.ce-badge.en_cours{background:var(--badge-success-bg);color:var(--emerald);}
.ce-badge.terminee{background:var(--bg);color:var(--text-2);}
.ce-badge.annulee{background:var(--danger-bg);color:var(--danger-text);}
.ce-request-meta{font-size:.82rem;color:var(--text-2);margin-bottom:10px;}
.ce-request-actions{display:flex;gap:8px;flex-wrap:wrap;}
.ce-request-chat-btn{background:var(--bg);border:1px solid var(--border);color:var(--ink);padding:8px 14px;border-radius:var(--rs);font-size:.8rem;font-weight:600;cursor:pointer;min-height:48px;display:inline-flex;align-items:center;gap:6px;}
@media (hover:hover){.ce-request-chat-btn:hover{border-color:var(--emerald);color:var(--emerald);}}
@media (hover:none){.ce-request-chat-btn:active{border-color:var(--emerald);color:var(--emerald);}}

.ce-empty{text-align:center;padding:40px 20px;color:var(--text-2);font-size:.9rem;background:var(--white);border:1.5px dashed var(--border);border-radius:var(--r);grid-column:1/-1;}

.ce-messaging{margin-top:32px;background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:20px;}
.ce-msg-thread{max-height:260px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
.ce-msg-bubble{background:var(--bg);border-radius:10px;padding:9px 12px;font-size:.86rem;}
.ce-msg-meta{font-size:.72rem;color:var(--text-2);margin-top:3px;}
.ce-msg-empty{font-size:.84rem;color:var(--text-2);text-align:center;padding:12px 0;}
.ce-msg-row{display:flex;gap:8px;}
.ce-msg-input{flex:1;min-width:0;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--rs);background:var(--bg);color:var(--ink);font-size:.88rem;min-height:48px;-webkit-appearance:none;appearance:none;}
.ce-msg-input:focus{border-color:var(--emerald);outline:none;}
.ce-msg-send{background:var(--emerald);color:var(--on-emerald);border:none;padding:0 18px;border-radius:var(--rs);font-weight:700;font-size:.86rem;cursor:pointer;min-height:48px;flex-shrink:0;}
.ce-msg-send:disabled{opacity:.5;cursor:not-allowed;}

.ce-modal-overlay{position:fixed;inset:0;background:var(--modal-overlay-bg);display:none;align-items:center;justify-content:center;z-index:500;padding:20px;}
.ce-modal-overlay.open{display:flex;}
.ce-modal{background:var(--white);border-radius:var(--r);padding:24px;width:100%;max-width:380px;}
.ce-modal h3{font-size:1rem;margin-bottom:4px;}
.ce-modal p{font-size:.82rem;color:var(--text-2);margin-bottom:14px;}
.ce-modal input{width:100%;padding:12px;border:1.5px solid var(--border);border-radius:var(--rs);background:var(--bg);color:var(--ink);font-size:.9rem;margin-bottom:14px;font-family:'Inter',sans-serif;min-height:48px;-webkit-appearance:none;appearance:none;}
.ce-modal input:focus{border-color:var(--emerald);outline:none;}
.ce-modal-actions{display:flex;gap:10px;}
.ce-modal-actions button{flex:1;padding:11px;border-radius:var(--rs);font-size:.86rem;font-weight:600;cursor:pointer;min-height:48px;}
.ce-modal-cancel{background:var(--bg);border:1px solid var(--border);color:var(--ink);}
.ce-modal-send{background:var(--emerald);border:none;color:var(--on-emerald);}
.ce-modal-send:disabled{opacity:.5;cursor:not-allowed;}

.ce-loading{text-align:center;padding:60px 20px;color:var(--text-2);font-size:.9rem;}

/* ── Chat de mission (tripartite Patron/Employé/Client, 2026-07-20) ──
   Feuille ancrée en bas sur mobile (le clavier réduit la hauteur du
   viewport -> le panneau, contraint en max-height:85dvh, se redimensionne
   avec lui : le champ de saisie reste toujours visible juste au-dessus du
   clavier, jamais de position:fixed collé au bas de l'écran qui risquerait
   d'être recouvert -- voir cahier des charges mobile 2026-07-19, point 4).
   Modale centrée classique dès 640px. */
.mc-overlay{position:fixed;inset:0;background:var(--modal-overlay-bg);display:none;align-items:flex-end;justify-content:center;z-index:600;}
.mc-overlay.open{display:flex;}
.mc-panel{background:var(--white);width:100%;max-width:480px;border-radius:var(--r) var(--r) 0 0;display:flex;flex-direction:column;max-height:85vh;max-height:85dvh;}
@media (min-width:640px){
  .mc-overlay{align-items:center;padding:20px;}
  .mc-panel{border-radius:var(--r);max-height:80vh;max-height:80dvh;}
}
.mc-header{display:flex;justify-content:space-between;align-items:flex-start;padding:18px 20px;border-bottom:1px solid var(--border);gap:12px;flex-shrink:0;}
.mc-title{font-weight:700;font-size:1rem;}
.mc-sub{font-size:.8rem;color:var(--text-2);margin-top:2px;}
.mc-close{background:none;border:none;font-size:1.3rem;color:var(--text-2);cursor:pointer;line-height:1;padding:6px;min-width:48px;min-height:48px;flex-shrink:0;}
.mc-thread{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px;}
.mc-row{display:flex;flex-direction:column;max-width:78%;}
.mc-row.self{align-self:flex-end;align-items:flex-end;}
.mc-row.other{align-self:flex-start;align-items:flex-start;}
.mc-author{font-size:.72rem;color:var(--text-2);margin-bottom:3px;padding:0 3px;font-weight:600;}
.mc-bubble{padding:9px 13px;border-radius:14px;font-size:.88rem;line-height:1.4;word-break:break-word;}
.mc-row.self .mc-bubble{background:var(--emerald);color:var(--on-emerald);border-bottom-right-radius:4px;}
.mc-row.other .mc-bubble{background:var(--bg);color:var(--ink);border:1px solid var(--border);border-bottom-left-radius:4px;}
.mc-time{font-size:.68rem;color:var(--text-2);margin-top:3px;padding:0 3px;}
.mc-empty{text-align:center;color:var(--text-2);font-size:.86rem;padding:28px 0;}
.mc-input-row{display:flex;gap:8px;padding:14px 16px;border-top:1px solid var(--border);flex-shrink:0;padding-bottom:max(14px, calc(10px + env(safe-area-inset-bottom,0px)));}
.mc-input{flex:1;min-width:0;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--rs);background:var(--bg);color:var(--ink);font-size:16px;min-height:48px;-webkit-appearance:none;appearance:none;}
.mc-input:focus{border-color:var(--emerald);outline:none;}
.mc-send{background:var(--emerald);color:var(--on-emerald);border:none;padding:0 18px;border-radius:var(--rs);font-weight:700;font-size:.86rem;cursor:pointer;min-height:48px;flex-shrink:0;}
.mc-send:disabled{opacity:.5;cursor:not-allowed;}

/* ── Visionneuse photo de clôture (2026-07-20b) -- URL signee generee a
   la demande (bucket prive), jamais mise en cache. ── */
.pv-overlay{position:fixed;inset:0;background:var(--modal-overlay-bg);display:none;align-items:center;justify-content:center;z-index:700;padding:20px;}
.pv-overlay.open{display:flex;}
.pv-panel{background:var(--white);border-radius:var(--r);padding:20px;max-width:520px;width:100%;position:relative;}
.pv-close{position:absolute;top:8px;right:8px;background:none;border:none;font-size:1.3rem;color:var(--text-2);cursor:pointer;min-width:48px;min-height:48px;}
.pv-body{text-align:center;padding:24px 10px 4px;color:var(--text-2);font-size:.9rem;}
.pv-body img{max-width:100%;border-radius:var(--rs);display:block;margin:0 auto;}

.ce-pw-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.ce-pw-row input{flex:1;min-width:120px;min-height:48px;-webkit-appearance:none;appearance:none;}

@media (max-width: 768px) {
  .ce-msg-input,.ce-modal input,.ce-pw-row input{font-size:16px;}
  .ce-actions{gap:12px;}
  .ce-header{gap:12px;}
}

/* ── Tablette/Desktop : grille (cahier des charges "adaptation
   multi-supports stricte", 2026-07-19) ── */
@media (min-width: 640px) {
  /* Cartes de demandes sur plusieurs colonnes des que la largeur le
     permet -- auto-fill+minmax : jamais moins de 260px par carte, donc
     jamais de debordement meme si le nombre de colonnes change. */
  .ce-request-grid{grid-template-columns:repeat(auto-fill,minmax(260px,1fr));}
}
@media (min-width: 900px) {
  .ce-wrap{max-width:1100px;padding-left:32px;padding-right:32px;}
  .ce-brand{width:auto;margin-bottom:0;margin-right:auto;order:-1;}
  .ce-header{align-items:center;}

  /* Colonne principale (demandes en cours + historique) + colonne
     laterale (messagerie + mot de passe), cote a cote -- minmax(0,1fr)
     jamais 1fr seul (piste de grille qui grandit au-dela du viewport,
     voir CLAUDE.md "Lecons apprises"). */
  .ce-main-grid{display:grid;grid-template-columns:minmax(0,1.7fr) minmax(0,1fr);gap:28px;align-items:start;}
  .ce-col-side{position:sticky;top:24px;}
  .ce-col-side .ce-messaging{margin-top:0;}
  .ce-col-side .ce-messaging + .ce-messaging{margin-top:20px;}
}
</style>
</head>
<body>

<div class="ce-wrap" id="ce-wrap" style="display:none;">
  <div class="ce-header">
    <div class="ce-brand" aria-hidden="true"><span class="ce-brand-dot"></span><span><span class="b-se">Se</span><span class="b-ba">ba</span></span></div>
    <div class="ce-greeting">
      <h1 id="ce-greeting">Bonjour</h1>
      <p id="ce-date"></p>
    </div>
    <div class="ce-actions">
      <button class="ce-btn-new" onclick="openNewRequestModal()">+ Nouvelle demande</button>
      <button class="ce-logout" onclick="handleLogout()">Se déconnecter</button>
    </div>
  </div>

  <div class="ce-main-grid">
    <div class="ce-col-main">
      <div class="ce-section-title">Mes demandes en cours</div>
      <div id="ce-requests-active" class="ce-request-grid"></div>

      <div class="ce-section-title ce-section-title-2">Historique</div>
      <div id="ce-requests-history" class="ce-request-grid"></div>
    </div>

    <div class="ce-col-side">
      <div class="ce-messaging">
        <div class="ce-section-title" style="margin-bottom:14px;">Messages</div>
        <div class="ce-msg-thread" id="ce-msg-thread"></div>
        <div class="ce-msg-row">
          <input type="text" class="ce-msg-input" id="ce-msg-input" placeholder="Écrire à votre prestataire..." onkeydown="if(event.key==='Enter')envoyerMessagePrestataire();">
          <button class="ce-msg-send" onclick="envoyerMessagePrestataire()">Envoyer</button>
        </div>
      </div>

      <div class="ce-messaging" id="ce-pw-panel">
        <div class="ce-section-title" style="margin-bottom:14px;">Mon mot de passe</div>
        <p style="font-size:.84rem;color:var(--text-2);margin-bottom:12px;">Changez votre mot de passe à tout moment.</p>
        <div class="ce-pw-row">
          <input type="password" class="ce-msg-input" id="ce-pw-new" placeholder="Nouveau mot de passe" minlength="6">
          <input type="password" class="ce-msg-input" id="ce-pw-confirm" placeholder="Confirmez" minlength="6">
        </div>
        <button class="ce-msg-send" style="width:100%;padding:11px;" onclick="modifierMonMotDePasse()">Modifier mon mot de passe</button>
        <p id="ce-pw-status" style="font-size:.82rem;margin-top:8px;"></p>
      </div>
    </div>
  </div>
</div>

<div class="ce-loading" id="ce-loading">Chargement…</div>

<div class="ce-modal-overlay" id="ce-modal-overlay">
  <div class="ce-modal">
    <h3>Nouvelle demande</h3>
    <p>Décrivez brièvement ce dont vous avez besoin.</p>
    <input type="text" id="ce-modal-titre" placeholder="Ex: Ménage supplémentaire cette semaine" maxlength="120">
    <div class="ce-modal-actions">
      <button class="ce-modal-cancel" onclick="closeNewRequestModal()">Annuler</button>
      <button class="ce-modal-send" onclick="submitNewRequest()">Envoyer</button>
    </div>
  </div>
</div>

<!-- Chat de mission (tripartite) -- ouvert depuis une carte de demande -->
<div class="mc-overlay" id="mc-overlay">
  <div class="mc-panel" role="dialog" aria-modal="true" aria-label="Chat de la demande">
    <div class="mc-header">
      <div>
        <div class="mc-title" id="mc-title">Chat</div>
        <div class="mc-sub" id="mc-sub"></div>
      </div>
      <button class="mc-close" onclick="closeMissionChat()" aria-label="Fermer">&times;</button>
    </div>
    <div class="mc-thread" id="mc-thread-mission"></div>
    <div class="mc-input-row">
      <input type="text" class="mc-input" id="mc-input" placeholder="Écrire un message..." onkeydown="if(event.key==='Enter')sendMissionChatMessage();">
      <button class="mc-send" id="mc-send" onclick="sendMissionChatMessage()">Envoyer</button>
    </div>
  </div>
</div>

<!-- Visionneuse photo de clôture -->
<div class="pv-overlay" id="pv-overlay" onclick="if(event.target===this)closePhotoViewer()">
  <div class="pv-panel">
    <button class="pv-close" onclick="closePhotoViewer()" aria-label="Fermer">&times;</button>
    <div class="pv-body" id="pv-body">Chargement…</div>
  </div>
</div>

<script src="seba-data.js"></script>
<script src="services/message-log.js"></script>
<script>
let _profile = null; // { client, account, client_id }

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

const STATUT_LABELS = { nouvelle: 'Nouvelle', en_cours: 'En cours', terminee: 'Terminée', annulee: 'Annulée' };

(async function init() {
  if (!window.SebaDB) return;
  const session = await SebaDB.clientPortal.session();
  if (!session) { window.location.href = 'client-connexion.html'; return; }

  _profile = await SebaDB.clientPortal.profile();
  if (!_profile || !_profile.ok) {
    window.location.href = 'client-connexion.html';
    return;
  }

  document.getElementById('ce-loading').style.display = 'none';
  document.getElementById('ce-wrap').style.display = 'block';

  const client = _profile.client || {};
  document.getElementById('ce-greeting').textContent = 'Bonjour ' + (client.prenom || '');
  document.getElementById('ce-date').textContent = new Date().toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });

  renderRequests();
  renderMessages();
})();

// Auto-service : le client change son propre mot de passe depuis ici, a
// tout moment -- miroir de modifierMonMotDePasse() sur espace-terrain.html.
async function modifierMonMotDePasse() {
  const newPw = document.getElementById('ce-pw-new').value;
  const confirmPw = document.getElementById('ce-pw-confirm').value;
  const status = document.getElementById('ce-pw-status');
  if (newPw.length < 6) {
    status.textContent = 'Le mot de passe doit contenir au moins 6 caractères.';
    status.style.color = 'var(--danger-text)';
    return;
  }
  if (newPw !== confirmPw) {
    status.textContent = 'Les deux mots de passe ne correspondent pas.';
    status.style.color = 'var(--danger-text)';
    return;
  }
  const btn = document.querySelector('#ce-pw-panel .ce-msg-send');
  if (btn.disabled) return; // anti double-tap : requête déjà en vol
  btn.disabled = true;
  status.textContent = 'Enregistrement…';
  status.style.color = '';
  const res = await SebaDB.clientPortal.setPassword(newPw);
  btn.disabled = false;
  if (res.ok) {
    status.textContent = 'Mot de passe modifié.';
    status.style.color = 'var(--emerald)';
    document.getElementById('ce-pw-new').value = '';
    document.getElementById('ce-pw-confirm').value = '';
  } else {
    status.textContent = res.error || 'Échec de la modification.';
    status.style.color = 'var(--danger-text)';
  }
}

let _requestsById = {};

function renderRequestCard(r) {
  return '<div class="ce-request">' +
      '<div class="ce-request-top">' +
        '<span class="ce-request-title">' + escapeHtml(r.titre) + '</span>' +
        '<span class="ce-badge ' + escapeHtml(r.statut) + '">' + (STATUT_LABELS[r.statut] || r.statut) + '</span>' +
      '</div>' +
      '<div class="ce-request-meta">' + (r.intervenantNom ? 'Intervenant : ' + escapeHtml(r.intervenantNom) : 'Pas encore assignée') + '</div>' +
      '<div class="ce-request-actions">' +
        '<button type="button" class="ce-request-chat-btn" onclick="openMissionChat(\'' + r.id + '\')">💬 Chat</button>' +
        (r.photoPath ? '<button type="button" class="ce-request-chat-btn" onclick="verPhotoMission(\'' + escapeHtml(r.photoPath) + '\')">📷 Voir la photo</button>' : '') +
      '</div>' +
    '</div>';
}

async function renderRequests() {
  const activeBox = document.getElementById('ce-requests-active');
  const historyBox = document.getElementById('ce-requests-history');
  const requests = await SebaDB.clientPortal.requests.list(_profile.account, _profile.client_id);
  _requestsById = {};
  requests.forEach(r => { _requestsById[r.id] = r; });

  const active = requests.filter(r => r.statut === 'nouvelle' || r.statut === 'en_cours');
  const history = requests.filter(r => r.statut === 'terminee' || r.statut === 'annulee');

  activeBox.innerHTML = active.length
    ? active.map(renderRequestCard).join('')
    : '<div class="ce-empty">Aucune demande en cours. Cliquez sur "+ Nouvelle demande" pour en créer une.</div>';

  historyBox.innerHTML = history.length
    ? history.map(renderRequestCard).join('')
    : '<div class="ce-empty">Aucun historique pour l\'instant.</div>';
}

function openNewRequestModal() {
  document.getElementById('ce-modal-titre').value = '';
  document.getElementById('ce-modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('ce-modal-titre').focus(), 100);
}
function closeNewRequestModal() {
  document.getElementById('ce-modal-overlay').classList.remove('open');
}
async function submitNewRequest() {
  const titre = document.getElementById('ce-modal-titre').value.trim();
  if (!titre) return;
  const btn = document.querySelector('.ce-modal-send');
  if (btn.disabled) return; // anti double-tap
  btn.disabled = true;
  btn.textContent = 'Envoi…';
  await SebaDB.clientPortal.requests.create(_profile.account, _profile.client_id, titre);
  btn.disabled = false;
  btn.textContent = 'Envoyer';
  closeNewRequestModal();
  renderRequests();
}

async function renderMessages() {
  const box = document.getElementById('ce-msg-thread');
  if (!window.SebaQuotes || !window.SebaQuotes.messagesFor) return;
  const msgs = await window.SebaQuotes.messagesFor('client', _profile.client_id, _profile.account);
  box.innerHTML = msgs.length
    ? msgs.map(m => '<div class="ce-msg-bubble">' + escapeHtml(m.texte) +
        '<div class="ce-msg-meta">' + (m.expediteurRole === 'client' ? 'Vous' : 'Votre prestataire') + ' · ' + (m.createdAt || '') + '</div></div>').join('')
    : '<div class="ce-msg-empty">Aucun message pour l\'instant.</div>';
  box.scrollTop = box.scrollHeight;
}

async function envoyerMessagePrestataire() {
  const inp = document.getElementById('ce-msg-input');
  const texte = inp.value.trim();
  if (!texte) return;
  const btn = document.querySelector('.ce-msg-row .ce-msg-send');
  if (btn.disabled) return; // anti double-tap
  btn.disabled = true;
  await window.SebaQuotes.createMessage({
    account: _profile.account, clientId: _profile.client_id, expediteurRole: 'client', destinataireRole: 'patron', texte,
  });
  inp.value = '';
  btn.disabled = false;
  renderMessages();
}

let _loggingOut = false;
async function handleLogout() {
  if (_loggingOut) return; // anti double-tap
  _loggingOut = true;
  await SebaDB.clientPortal.logout();
  window.location.href = 'client-connexion.html';
}

// ── Chat de mission (tripartite) ──────────────────────────────────────
// Ancré sur une demande précise (request_id), distinct du fil générique
// "Messages" ci-dessus (patron<->client, hors contexte de mission).
let _missionChatRequestId = null;
function missionChatAuthor(m, req) {
  if (m.expediteurRole === 'client') return null; // self, pas de nom au-dessus
  if (m.expediteurRole === 'employe') return (req && req.intervenantNom) || 'Intervenant';
  return 'Votre prestataire';
}
function openMissionChat(requestId) {
  const req = _requestsById[requestId];
  if (!req) return;
  _missionChatRequestId = requestId;
  document.getElementById('mc-title').textContent = 'Chat — ' + req.titre;
  document.getElementById('mc-sub').textContent = req.intervenantNom ? 'Avec ' + req.intervenantNom : 'Pas encore d\'intervenant assigné';
  document.getElementById('mc-input').value = '';
  document.getElementById('mc-overlay').classList.add('open');
  renderMissionChatThread();
  setTimeout(() => document.getElementById('mc-input').focus(), 150);
}
function closeMissionChat() {
  document.getElementById('mc-overlay').classList.remove('open');
  _missionChatRequestId = null;
}
async function renderMissionChatThread() {
  const box = document.getElementById('mc-thread-mission');
  if (!_missionChatRequestId) return;
  const req = _requestsById[_missionChatRequestId];
  const msgs = await window.SebaQuotes.messagesForRequest(_missionChatRequestId, _profile.account);
  if (!msgs.length) {
    box.innerHTML = '<div class="mc-empty">Aucun message pour l\'instant. Écrivez le premier.</div>';
    return;
  }
  box.innerHTML = msgs.map(m => {
    const self = m.expediteurRole === 'client';
    const author = missionChatAuthor(m, req);
    return '<div class="mc-row ' + (self ? 'self' : 'other') + '">' +
      (author ? '<div class="mc-author">' + escapeHtml(author) + '</div>' : '') +
      '<div class="mc-bubble">' + escapeHtml(m.texte) + '</div>' +
    '</div>';
  }).join('');
  box.scrollTop = box.scrollHeight;
}
async function sendMissionChatMessage() {
  const inp = document.getElementById('mc-input');
  const texte = inp.value.trim();
  if (!texte || !_missionChatRequestId) return;
  const btn = document.getElementById('mc-send');
  if (btn.disabled) return; // anti double-tap
  btn.disabled = true;
  await window.SebaQuotes.createMessage({
    account: _profile.account, clientId: _profile.client_id, requestId: _missionChatRequestId,
    expediteurRole: 'client', destinataireRole: 'patron', texte,
  });
  inp.value = '';
  btn.disabled = false;
  renderMissionChatThread();
}

// ── Visionneuse photo de clôture (2026-07-20b) ──────────────────────
function openPhotoViewer() {
  document.getElementById('pv-body').textContent = 'Chargement…';
  document.getElementById('pv-overlay').classList.add('open');
}
function closePhotoViewer() {
  document.getElementById('pv-overlay').classList.remove('open');
}
async function verPhotoMission(photoPath) {
  if (!photoPath) return;
  openPhotoViewer();
  const body = document.getElementById('pv-body');
  if (!window.sebaAuth || !sebaAuth.isConfigured) {
    body.textContent = 'Aperçu non disponible en mode démo (aucun fichier réellement stocké côté serveur).';
    return;
  }
  const res = await sebaAuth.getSignedUrl('mission-photos', photoPath);
  if (!res.ok) {
    body.textContent = 'Impossible de charger la photo : ' + (res.error || 'erreur inconnue');
    return;
  }
  body.innerHTML = '<img src="' + res.url + '" alt="Photo de fin d\'intervention">';
}
